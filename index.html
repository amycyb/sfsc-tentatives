<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFSC Tentative Rulings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #111;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #1a3a5c;
      color: white;
      padding: 0 1.25rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      height: 44px;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 0.95rem; font-weight: 600; white-space: nowrap; }
    #stats { font-size: 0.73rem; opacity: 0.65; white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 0.5rem; }

    .hbtn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      white-space: nowrap;
      text-decoration: none;
    }
    .hbtn-ghost {
      background: rgba(255,255,255,0.12);
      color: white;
    }
    .hbtn-ghost:hover { background: rgba(255,255,255,0.22); }
    .hbtn-accent {
      background: #f0a500;
      color: #1a2a00;
    }
    .hbtn-accent:hover { background: #f8b820; }

    /* ── Toolbar ── */
    .toolbar {
      background: white;
      border-bottom: 1px solid #d0d7de;
      padding: 0.4rem 1.25rem;
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }
    .toolbar input, .toolbar select {
      padding: 0.28rem 0.55rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.8rem;
      background: white;
      height: 26px;
    }
    #search { width: 220px; }
    .sep { width: 1px; height: 18px; background: #ddd; margin: 0 0.1rem; flex-shrink: 0; }
    .toolbar label { font-size: 0.75rem; color: #666; display: flex; align-items: center; gap: 0.3rem; }

    .btn {
      padding: 0.28rem 0.7rem;
      border: 1px solid #ccc; border-radius: 4px;
      background: white; font-size: 0.78rem;
      cursor: pointer; height: 26px;
      display: inline-flex; align-items: center; gap: 0.3rem;
      white-space: nowrap; color: #333;
    }
    .btn:hover { background: #f0f5ff; border-color: #a0b4cc; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: #1a3a5c; color: white; border-color: #1a3a5c; }
    .btn-primary:hover { background: #214d78; }

    /* ── Result bar ── */
    .result-bar {
      padding: 0.22rem 1.25rem;
      background: #f8f9fa;
      border-bottom: 1px solid #e8eaed;
      font-size: 0.72rem; color: #666;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      min-height: 22px;
    }

    /* ── Table ── */
    .table-wrap { flex: 1; overflow: auto; position: relative; }

    table {
      width: 100%; border-collapse: collapse;
      font-size: 0.8rem; table-layout: fixed;
    }
    thead { position: sticky; top: 0; z-index: 10; }
    th {
      background: #1a3a5c; color: white;
      padding: 0.32rem 0.6rem;
      text-align: left; font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.03em; text-transform: uppercase;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      user-select: none; border-right: 1px solid #214d78;
    }
    th:last-child { border-right: none; }
    th.sortable { cursor: pointer; }
    th.sortable:hover { background: #214d78; }
    th.sort-asc::after  { content: ' ▲'; font-size: 0.6rem; }
    th.sort-desc::after { content: ' ▼'; font-size: 0.6rem; }

    .col-dept   { width: 52px; }
    .col-date   { width: 86px; }
    .col-time   { width: 48px; }
    .col-case   { width: 108px; }
    .col-title  { width: 20%; }
    .col-motion { width: 28%; }
    .col-judge  { width: 135px; }
    .col-ruling { width: auto; min-width: 100px; }

    td {
      padding: 0.26rem 0.6rem;
      border-bottom: 1px solid #eaecef; border-right: 1px solid #f0f2f4;
      vertical-align: top; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; max-width: 0;
    }
    td:last-child { border-right: none; }
    tbody tr { cursor: pointer; }
    tbody tr:hover td { background: #eef3fb; }
    tbody tr:nth-child(even) td { background: #fafbfc; }
    tbody tr:nth-child(even):hover td { background: #eef3fb; }
    .no-data { text-align: center; padding: 2rem; color: #999; }

    /* ── Pager ── */
    .pager {
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; gap: 0.25rem;
      padding: 0.35rem; border-top: 1px solid #d0d7de; background: white;
    }
    .pager button {
      padding: 0.2rem 0.5rem; border: 1px solid #ccc;
      background: white; border-radius: 3px; cursor: pointer;
      font-size: 0.75rem; min-width: 28px;
    }
    .pager button.active { background: #1a3a5c; color: white; border-color: #1a3a5c; }
    .pager button:hover:not(.active):not(:disabled) { background: #f0f5ff; }
    .pager button:disabled { opacity: 0.35; cursor: default; }
    #page-info { font-size: 0.72rem; color: #666; padding: 0 0.4rem; white-space: nowrap; }

    /* ── Loading / Error ── */
    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f4f6f9; gap: 0.65rem; color: #555;
    }
    .spinner {
      width: 2rem; height: 2rem;
      border: 3px solid #ddd; border-top-color: #1a3a5c;
      border-radius: 50%; animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #load-detail { font-size: 0.75rem; color: #aaa; }
    #error-bar {
      display: none; padding: 0.55rem 1.25rem;
      background: #fff0f0; border-bottom: 1px solid #f5c6c6;
      color: #7a2020; font-size: 0.8rem;
    }
    #qspinner {
      width: 12px; height: 12px;
      border: 2px solid #ddd; border-top-color: #1a3a5c;
      border-radius: 50%; animation: spin 0.6s linear infinite; display: none;
    }
    #qspinner.on { display: inline-block; }

    /* ── Detail modal ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 200;
      padding: 2rem 1rem; overflow-y: auto;
    }
    .overlay.open { display: flex; align-items: flex-start; justify-content: center; }
    .modal {
      background: white; border-radius: 6px;
      max-width: 860px; width: 100%;
      padding: 1.25rem 1.5rem; position: relative; margin: auto;
    }
    .modal h2 { font-size: 0.95rem; margin-bottom: 0.2rem; padding-right: 2rem; }
    .modal .meta { font-size: 0.74rem; color: #888; margin-bottom: 0.7rem; }
    .modal .motion {
      font-size: 0.8rem; color: #444; font-style: italic;
      background: #f7f8fa; border-left: 3px solid #1a3a5c;
      padding: 0.4rem 0.7rem; margin-bottom: 0.7rem; border-radius: 0 4px 4px 0;
    }
    .modal .ruling { font-size: 0.85rem; line-height: 1.8; white-space: pre-wrap; }
    .modal .admin-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em;
      color: #888; margin: 1rem 0 0.3rem; }
    .modal .admin-notes { font-size: 0.78rem; line-height: 1.6; color: #666;
      white-space: pre-wrap; border-top: 1px dashed #ddd; padding-top: 0.6rem; }
    .modal-close {
      position: absolute; top: 0.8rem; right: 0.8rem;
      background: none; border: none; font-size: 1.4rem;
      cursor: pointer; color: #aaa; line-height: 1;
    }
    .modal-close:hover { color: #333; }

    @media (max-width: 680px) {
      .col-time, .col-dept { display: none; }
      #search { width: 140px; }
      #stats { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>SF Superior Court — Tentative Rulings</h1>
    <span id="stats">Loading…</span>
  </div>
  <div class="header-right">
    <button class="hbtn hbtn-ghost" id="export-btn">⬇ CSV</button>
  </div>
</header>

<div class="toolbar" id="toolbar" style="display:none">
  <input type="search" id="search" placeholder="Search…">
  <div class="sep"></div>
  <label>From <input type="date" id="date-from" style="width:120px"></label>
  <label>To <input type="date" id="date-to" style="width:120px"></label>
  <div class="sep"></div>
  <select id="dept" style="width:95px"><option value="">All depts</option></select>
  <select id="judge" style="width:145px"><option value="">All judges</option></select>
  <div class="sep"></div>
  <button class="btn" id="clear-btn">✕ Clear</button>
  <div style="margin-left:auto;display:flex;align-items:center;gap:0.4rem">
    <label style="font-size:0.73rem;color:#666">Rows
      <select id="page-size" style="padding:0.15rem;font-size:0.73rem;border:1px solid #ccc;border-radius:3px;height:auto">
        <option value="50">50</option>
        <option value="100">100</option>
        <option value="250">250</option>
        <option value="500">500</option>
      </select>
    </label>
  </div>
</div>

<div id="error-bar"></div>

<div class="result-bar" id="result-bar" style="display:none">
  <span id="result-info"></span>
  <span id="qspinner"></span>
</div>

<div class="table-wrap" id="table-wrap">
  <div id="loading">
    <div class="spinner"></div>
    <div id="load-msg">Downloading data…</div>
    <div id="load-detail"></div>
  </div>
  <table id="grid" style="display:none">
    <thead>
      <tr>
        <th class="col-dept  sortable" data-col="department">Dept</th>
        <th class="col-date  sortable sort-desc" data-col="court_date">Date</th>
        <th class="col-time">Time</th>
        <th class="col-case  sortable" data-col="case_number">Case #</th>
        <th class="col-title sortable" data-col="case_title">Case Title</th>
        <th class="col-motion">Motion</th>
        <th class="col-judge sortable" data-col="judge">Judge</th>
        <th class="col-ruling">Ruling (excerpt)</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="pager" id="pager" style="display:none">
  <button id="pg-first">«</button>
  <button id="pg-prev">‹</button>
  <span id="page-info"></span>
  <button id="pg-next">›</button>
  <button id="pg-last">»</button>
</div>

<!-- Row detail modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">×</button>
    <h2 id="modal-title"></h2>
    <div class="meta" id="modal-meta"></div>
    <div class="motion" id="modal-motion"></div>
    <div class="ruling" id="modal-ruling"></div>
    <div class="admin-label" id="modal-admin-label" style="display:none">Administrative notes</div>
    <div class="admin-notes" id="modal-admin"></div>
  </div>
</div>

<script type="module">
import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm/+esm';

// ── State ─────────────────────────────────────────────────────────────────────
let conn, totalRows = 0, currentPage = 0, lastCount = 0, PAGE_SIZE = 50;
let sortCol = 'court_date', sortDir = 'DESC', rows = [];
const $ = id => document.getElementById(id);
const searchEl = $('search'), dateFrom = $('date-from'), dateTo = $('date-to');
const deptEl = $('dept'), judgeEl = $('judge');

// ── Init ──────────────────────────────────────────────────────────────────────
try {
  $('load-msg').textContent = 'Downloading data…';
  const res = await fetch('./tentatives.parquet');
  if (!res.ok) throw new Error(`HTTP ${res.status} fetching tentatives.parquet`);

  // Streamed download with progress
  let buf;
  if (res.body) {
    const total = +res.headers.get('Content-Length') || 0;
    const reader = res.body.getReader();
    const chunks = []; let received = 0;
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value); received += value.length;
      if (total) $('load-detail').textContent =
        `${(received/1e6).toFixed(1)} / ${(total/1e6).toFixed(1)} MB`;
    }
    buf = new Uint8Array(received); let off = 0;
    for (const c of chunks) { buf.set(c, off); off += c.length; }
  } else {
    buf = new Uint8Array(await res.arrayBuffer());
  }

  $('load-msg').textContent = 'Initializing database…';
  $('load-detail').textContent = '';
  const bundles = duckdb.getJsDelivrBundles();
  const bundle  = await duckdb.selectBundle(bundles);
  const wUrl    = URL.createObjectURL(
    new Blob([`importScripts("${bundle.mainWorker}");`], { type: 'text/javascript' })
  );
  const db = new duckdb.AsyncDuckDB(new duckdb.VoidLogger(), new Worker(wUrl));
  await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
  URL.revokeObjectURL(wUrl);
  await db.registerFileBuffer('data.parquet', buf);
  conn = await db.connect();

  // Stats
  const s = (await conn.query(
    `SELECT COUNT(*) n, MIN(court_date) lo, MAX(court_date) hi FROM 'data.parquet'`
  )).toArray()[0];
  totalRows = Number(s.n);
  $('stats').textContent = `${totalRows.toLocaleString()} rulings · ${s.lo} → ${s.hi}`;

  // Dropdowns
  for (const r of (await conn.query(
    `SELECT DISTINCT department FROM 'data.parquet' WHERE department IS NOT NULL ORDER BY department`
  )).toArray()) deptEl.appendChild(new Option(`Dept ${r.department}`, r.department));

  for (const r of (await conn.query(
    `SELECT DISTINCT judge FROM 'data.parquet' WHERE judge IS NOT NULL AND judge!='' ORDER BY judge`
  )).toArray()) judgeEl.appendChild(new Option(r.judge, r.judge));

  dateFrom.value = s.lo; dateTo.value = s.hi;

  // Show UI
  $('loading').style.display = 'none';
  $('grid').style.display = '';
  $('toolbar').style.display = '';
  $('result-bar').style.display = '';
  $('pager').style.display = '';

  restoreState();

  // Sort headers
  document.querySelectorAll('th.sortable').forEach(th =>
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      sortDir = sortCol === col && sortDir === 'DESC' ? 'ASC' : 'DESC';
      sortCol = col;
      document.querySelectorAll('th.sortable').forEach(h =>
        h.classList.remove('sort-asc', 'sort-desc'));
      th.classList.add(sortDir === 'ASC' ? 'sort-asc' : 'sort-desc');
      runQuery(0);
    })
  );

  await runQuery(0);

} catch (err) {
  $('loading').style.display = 'none';
  const bar = $('error-bar');
  bar.style.display = 'block';
  bar.textContent = 'Failed to load data: ' + err.message;
  console.error(err);
}

// ── Query ─────────────────────────────────────────────────────────────────────
function buildWhere() {
  const q     = searchEl.value.trim().replace(/'/g, "''");
  const from  = dateFrom.value, to = dateTo.value;
  const dept  = deptEl.value, judge = judgeEl.value;
  const parts = [];
  if (from)  parts.push(`court_date >= '${from}'`);
  if (to)    parts.push(`court_date <= '${to}'`);
  if (dept)  parts.push(`department = '${dept.replace(/'/g,"''")}'`);
  if (judge) parts.push(`judge = '${judge.replace(/'/g,"''")}'`);
  if (q)     parts.push(`(case_number ILIKE '%${q}%' OR case_title ILIKE '%${q}%' OR ruling ILIKE '%${q}%' OR admin_notes ILIKE '%${q}%')`);
  return parts.length ? parts.join(' AND ') : 'TRUE';
}

async function runQuery(page = 0) {
  currentPage = page;
  const where = buildWhere(), offset = page * PAGE_SIZE;
  $('qspinner').classList.add('on');
  saveState();
  try {
    const [cntR, rowsR] = await Promise.all([
      conn.query(`SELECT COUNT(*) n FROM 'data.parquet' WHERE ${where}`),
      conn.query(`
        SELECT department, case_number, case_title, court_date, hearing_time,
               calendar_matter, judge, ruling, admin_notes
        FROM 'data.parquet' WHERE ${where}
        ORDER BY ${sortCol} ${sortDir}, case_number
        LIMIT ${PAGE_SIZE} OFFSET ${offset}
      `),
    ]);
    lastCount = Number(cntR.toArray()[0].n);
    rows = rowsR.toArray();
    renderTable(rows);
    renderPager(lastCount, page);
    $('result-info').textContent =
      `${lastCount.toLocaleString()} row${lastCount !== 1 ? 's' : ''}` +
      (lastCount !== totalRows ? ` of ${totalRows.toLocaleString()} total` : '');
  } finally { $('qspinner').classList.remove('on'); }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderTable(data) {
  const tbody = $('tbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="no-data">No rulings match your filters.</td></tr>';
    return;
  }
  tbody.innerHTML = data.map((r, i) => `<tr data-idx="${i}">
    <td class="col-dept">${esc(r.department)}</td>
    <td class="col-date">${r.court_date ?? ''}</td>
    <td class="col-time">${r.hearing_time ?? ''}</td>
    <td class="col-case">${esc(r.case_number)}</td>
    <td class="col-title">${esc(r.case_title)}</td>
    <td class="col-motion">${esc(r.calendar_matter)}</td>
    <td class="col-judge">${esc(r.judge)}</td>
    <td class="col-ruling">${esc((r.ruling ?? '').slice(0, 120))}</td>
  </tr>`).join('');
  window._rows = data;
  tbody.querySelectorAll('tr').forEach(tr =>
    tr.addEventListener('click', () => openModal(window._rows[+tr.dataset.idx]))
  );
}

function renderPager(total, page) {
  const pages = Math.ceil(total / PAGE_SIZE) || 1;
  $('page-info').textContent = `Page ${page + 1} of ${pages.toLocaleString()}`;
  $('pg-first').disabled = page === 0;
  $('pg-prev').disabled  = page === 0;
  $('pg-next').disabled  = page >= pages - 1;
  $('pg-last').disabled  = page >= pages - 1;
  $('pg-last').dataset.p = pages - 1;
}

['pg-first','pg-prev','pg-next','pg-last'].forEach(id =>
  $(id).addEventListener('click', () => {
    if ($(id).disabled) return;
    const pages = Math.ceil(lastCount / PAGE_SIZE) || 1;
    const p = id === 'pg-first' ? 0 : id === 'pg-prev' ? currentPage - 1
            : id === 'pg-next'  ? currentPage + 1 : pages - 1;
    runQuery(Math.max(0, Math.min(p, pages - 1)));
  })
);

$('page-size').addEventListener('change', () => {
  PAGE_SIZE = +$('page-size').value; runQuery(0);
});

// ── CSV export ────────────────────────────────────────────────────────────────
$('export-btn').addEventListener('click', async () => {
  if (!conn) return;
  const orig = $('export-btn').textContent;
  $('export-btn').disabled = true; $('export-btn').textContent = '…';
  const all = (await conn.query(`
    SELECT department, case_number, case_title, court_date, hearing_time,
           calendar_matter, judge, ruling, admin_notes
    FROM 'data.parquet' WHERE ${buildWhere()}
    ORDER BY ${sortCol} ${sortDir}, case_number
  `)).toArray();
  const cols = ['department','case_number','case_title','court_date','hearing_time',
                'calendar_matter','judge','ruling','admin_notes'];
  const csv = [cols.join(','), ...all.map(r =>
    cols.map(c => csvCell(r[c])).join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = `sfsc-rulings-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  $('export-btn').disabled = false; $('export-btn').textContent = orig;
});

// ── Clear ─────────────────────────────────────────────────────────────────────
$('clear-btn').addEventListener('click', async () => {
  searchEl.value = ''; deptEl.value = ''; judgeEl.value = '';
  if (conn) {
    const s = (await conn.query(
      `SELECT MIN(court_date) lo, MAX(court_date) hi FROM 'data.parquet'`
    )).toArray()[0];
    dateFrom.value = s.lo; dateTo.value = s.hi;
  }
  runQuery(0);
});

// ── Row detail modal ──────────────────────────────────────────────────────────
function openModal(r) {
  $('modal-title').textContent  = r.case_title ?? '';
  $('modal-meta').textContent   = [r.department ? `Dept ${r.department}` : null,
    r.case_number, r.court_date, r.hearing_time, r.judge].filter(Boolean).join(' · ');
  $('modal-motion').textContent = r.calendar_matter ?? '';
  $('modal-ruling').textContent = r.ruling ?? '';
  const admin = r.admin_notes ?? '';
  $('modal-admin').textContent  = admin;
  $('modal-admin-label').style.display = admin ? '' : 'none';
  $('modal-admin').style.display       = admin ? '' : 'none';
  $('overlay').classList.add('open');
}
function closeModal() { $('overlay').classList.remove('open'); }
$('modal-close').addEventListener('click', closeModal);
$('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── URL state ─────────────────────────────────────────────────────────────────
function saveState() {
  const p = new URLSearchParams();
  if (searchEl.value) p.set('q', searchEl.value);
  if (dateFrom.value) p.set('from', dateFrom.value);
  if (dateTo.value)   p.set('to', dateTo.value);
  if (deptEl.value)   p.set('dept', deptEl.value);
  if (judgeEl.value)  p.set('judge', judgeEl.value);
  if (currentPage)    p.set('page', currentPage);
  history.replaceState(null, '', '#' + p.toString());
}
function restoreState() {
  if (!location.hash) return;
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.get('q'))     searchEl.value = p.get('q');
  if (p.get('from'))  dateFrom.value = p.get('from');
  if (p.get('to'))    dateTo.value   = p.get('to');
  if (p.get('dept'))  deptEl.value   = p.get('dept');
  if (p.get('judge')) judgeEl.value  = p.get('judge');
  if (p.get('page'))  currentPage    = +p.get('page');
}

// ── Events ────────────────────────────────────────────────────────────────────
let timer;
const debounce = fn => { clearTimeout(timer); timer = setTimeout(fn, 350); };
searchEl.addEventListener('input',  () => debounce(() => runQuery(0)));
dateFrom.addEventListener('change', () => runQuery(0));
dateTo.addEventListener('change',   () => runQuery(0));
deptEl.addEventListener('change',   () => runQuery(0));
judgeEl.addEventListener('change',  () => runQuery(0));

function esc(s) {
  return (s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function csvCell(v) {
  const s = (v ?? '').toString().replace(/"/g, '""');
  return /[",\n]/.test(s) ? `"${s}"` : s;
}
</script>
