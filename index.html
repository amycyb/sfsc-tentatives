<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SF Superior Court — Tentative Rulings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #222; background: #f4f6f9;
      font-size: 13px; line-height: 1.45;
    }

    /* ── Header ── */
    header {
      background: #1a3a5c; color: white;
      padding: 0.75rem 1rem;
      display: flex; align-items: center;
      gap: 1rem; flex-wrap: wrap;
    }
    header h1 { font-size: 0.95rem; font-weight: 600; margin: 0; }
    .header-left  { display: flex; align-items: center; gap: 1rem; min-width: 0; }
    .header-right { display: flex; align-items: center; gap: 0.5rem; margin-left: auto; }
    #stats {
      font-size: 0.8rem; opacity: 0.85;
      display: inline-flex; align-items: center; gap: 0.35rem;
    }
    .hbtn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: white; cursor: pointer;
      font-size: 0.78rem; font-weight: 500;
      padding: 0.32rem 0.7rem; border-radius: 4px;
    }
    .hbtn:hover    { background: rgba(255,255,255,0.22); }
    .hbtn.active   { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.5); }
    .hbtn:disabled { opacity: 0.5; cursor: default; }

    /* ── Toolbar (chip filters) ── */
    .toolbar {
      background: white; border-bottom: 1px solid #d8dee8;
      padding: 0.55rem 1rem;
      display: flex; flex-wrap: wrap;
      align-items: center; gap: 0.4rem;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.25rem 0.45rem;
      background: #eef3fb; border: 1px solid #ccd6e6; border-radius: 4px;
      font-size: 0.74rem; color: #1a3a5c;
    }
    .chip > label { font-size: 0.72rem; color: #555; }
    .chip input, .chip select {
      border: none; background: transparent;
      font-size: 0.78rem; padding: 0.05rem 0.1rem;
      color: #1a3a5c; max-width: 160px;
    }
    .chip input:focus, .chip select:focus { outline: 2px solid #5a8fc8; outline-offset: 0; border-radius: 2px; }
    .chip input[type=date] { width: 110px; }
    .chip input[type=search] { width: 180px; }
    .toolbar .sep {
      width: 1px; height: 20px; background: #d8dee8;
      margin: 0 0.2rem;
    }
    .toolbar label.size { font-size: 0.73rem; color: #666; display: flex; align-items: center; gap: 0.3rem; }
    .toolbar label.size select {
      padding: 0.15rem; font-size: 0.73rem;
      border: 1px solid #ccc; border-radius: 3px;
    }
    .btn {
      padding: 0.32rem 0.7rem; background: #f0f3f8;
      border: 1px solid #c2ccd9; border-radius: 4px;
      cursor: pointer; font-size: 0.74rem; color: #1a3a5c;
    }
    .btn:hover { background: #e3eaf5; }

    /* ── Filter builder ── */
    .filter-builder {
      background: white; border-bottom: 1px solid #d8dee8;
      padding: 0.5rem 1rem 0.7rem;
      display: none;
    }
    .filter-builder.open { display: block; }
    .filter-row {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      align-items: center; margin-bottom: 0.35rem;
    }
    .filter-row select, .filter-row input {
      padding: 0.25rem 0.4rem; font-size: 0.78rem;
      border: 1px solid #c2ccd9; border-radius: 3px; background: white;
    }
    .filter-row select:focus, .filter-row input:focus {
      outline: none; border-color: #5a8fc8; box-shadow: 0 0 0 1px #5a8fc8;
    }
    .filter-row .x {
      width: 22px; height: 22px;
      border: none; background: transparent;
      color: #888; cursor: pointer; font-size: 1rem; padding: 0;
    }
    .filter-row .x:hover { color: #c0392b; }
    #add-filter-btn {
      font-size: 0.74rem; padding: 0.25rem 0.55rem;
    }

    /* ── Charts panel ── */
    .charts-panel {
      background: white; border-bottom: 1px solid #d8dee8;
      padding: 0.75rem 1rem;
      display: none;
    }
    .charts-panel.open { display: block; }
    .charts-toolbar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem;
      margin-bottom: 0.7rem; padding-bottom: 0.55rem;
      border-bottom: 1px dashed #e1e6ee;
    }
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 0.85rem;
    }
    .chart-card {
      background: #fafbfd; border: 1px solid #e1e6ee; border-radius: 5px;
      padding: 0.55rem 0.65rem 0.6rem; min-height: 240px;
      display: flex; flex-direction: column;
      position: relative;
    }
    .chart-card.wide { grid-column: span 2; }
    .chart-header {
      display: flex; align-items: center; gap: 0.3rem;
      margin: 0 0 0.4rem;
    }
    .chart-card h3 {
      margin: 0; font-size: 0.78rem;
      font-weight: 600; color: #1a3a5c;
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .chart-card .panel-btn {
      width: 22px; height: 22px;
      border: none; background: transparent;
      color: #aaa; cursor: pointer; font-size: 0.85rem;
      padding: 0; line-height: 1; border-radius: 3px;
    }
    .chart-card .panel-btn:hover { background: #eef3fb; color: #1a3a5c; }
    .chart-card .panel-btn.del:hover { background: #fff0f0; color: #c0392b; }
    .chart-wrap { flex: 1; position: relative; min-height: 200px; }
    .panel-config {
      display: none; padding: 0.5rem 0.5rem 0.6rem;
      background: white; border: 1px solid #c8d8f0; border-radius: 4px;
      margin-bottom: 0.5rem;
    }
    .panel-config.open { display: block; }
    .panel-config-row {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      align-items: center; margin-bottom: 0.35rem;
    }
    .panel-config-row label {
      font-size: 0.7rem; color: #555; min-width: 70px;
    }
    .panel-config-row select, .panel-config-row input {
      padding: 0.18rem 0.35rem; font-size: 0.74rem;
      border: 1px solid #c2ccd9; border-radius: 3px;
      background: white; flex: 1; min-width: 0;
    }
    .panel-config-row .preset-pick {
      width: 100%; font-weight: 500;
    }
    .stat-display {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 0.5rem;
    }
    .stat-display .stat-value {
      font-size: 2.4rem; font-weight: 600; color: #1a3a5c;
      line-height: 1.1;
    }
    .stat-display .stat-sub {
      font-size: 0.78rem; color: #666; margin-top: 0.4rem;
      text-align: center;
    }

    /* ── Result bar / table ── */
    .result-bar {
      padding: 0.4rem 1rem; font-size: 0.78rem;
      color: #555; background: white; border-bottom: 1px solid #e8edf4;
      display: flex; align-items: center; justify-content: space-between;
    }
    #qspinner {
      width: 11px; height: 11px;
      border: 2px solid #ccc; border-top-color: #1a3a5c;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      display: none;
    }
    #qspinner.on { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .table-wrap { background: white; overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse; font-size: 0.78rem;
    }
    th, td {
      text-align: left; padding: 0.4rem 0.6rem;
      border-bottom: 1px solid #eef0f4; vertical-align: top;
    }
    th {
      background: #f4f6f9; color: #555; font-weight: 600;
      position: sticky; top: 0; z-index: 1;
      white-space: nowrap;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background: #e8edf4; }
    th.sort-asc::after  { content: ' ▲'; font-size: 0.7em; }
    th.sort-desc::after { content: ' ▼'; font-size: 0.7em; }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #f7faff; }
    .col-dept    { width: 50px; white-space: nowrap; }
    .col-date    { width: 95px; white-space: nowrap; }
    .col-time    { width: 65px; white-space: nowrap; }
    .col-case    { width: 110px; font-family: monospace; }
    .col-mtype   { width: 200px; }
    .col-outcome { width: 130px; }
    .col-judge   { width: 165px; }
    .col-ruling  { color: #666; }
    .mtype-pill {
      display: inline-block; padding: 1px 6px;
      background: #eef3fb; border: 1px solid #ccd6e6;
      border-radius: 10px; font-size: 0.72rem; color: #1a3a5c;
      max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .mtype-sub { font-size: 0.7rem; color: #888; margin-top: 1px; }
    .outcome-pill {
      display: inline-block; padding: 1px 6px;
      border-radius: 10px; font-size: 0.72rem;
      max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      border: 1px solid transparent;
    }
    .outcome-granted     { background: #e6f4ea; border-color: #b2dfca; color: #1a5c2a; }
    .outcome-denied      { background: #fdecea; border-color: #f5c6c6; color: #7a2020; }
    .outcome-continued   { background: #fff8e1; border-color: #ffe082; color: #6b5300; }
    .outcome-off         { background: #f0f0f0; border-color: #d0d0d0; color: #555; }
    .outcome-other       { background: #eef3fb; border-color: #ccd6e6; color: #1a3a5c; }
    .no-data {
      text-align: center; padding: 2.5rem; color: #888; font-style: italic;
    }
    #loading {
      padding: 3rem 1rem; text-align: center; color: #555;
    }
    #loading .spinner {
      width: 28px; height: 28px;
      border: 3px solid #d8dee8; border-top-color: #1a3a5c;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 0.6rem;
    }
    #load-detail { font-size: 0.78rem; color: #888; margin-top: 0.3rem; }
    #error-bar {
      padding: 0.6rem 1rem; background: #fff0f0;
      border-bottom: 1px solid #f5c6c6; color: #7a2020;
      font-size: 0.8rem; display: none;
    }

    /* ── Pager ── */
    .pager {
      display: flex; gap: 0.3rem; padding: 0.55rem 1rem;
      align-items: center; justify-content: center;
      background: white; border-top: 1px solid #d8dee8;
    }
    .pager button {
      padding: 0.25rem 0.55rem; background: #f0f3f8;
      border: 1px solid #c2ccd9; border-radius: 3px;
      cursor: pointer; font-size: 0.78rem; color: #1a3a5c;
    }
    .pager button:hover:not(:disabled) { background: #e3eaf5; }
    .pager button:disabled { opacity: 0.4; cursor: default; }
    #page-info { font-size: 0.78rem; color: #555; margin: 0 0.4rem; }

    /* ── Modal ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      padding: 2rem 1rem; overflow-y: auto;
    }
    .overlay.open {
      display: flex; align-items: flex-start; justify-content: center;
    }
    .modal {
      background: white; border-radius: 8px;
      max-width: 760px; width: 100%;
      padding: 1.5rem 1.75rem; position: relative; margin: auto;
    }
    .modal h2 { font-size: 1.05rem; margin: 0 0 0.4rem; padding-right: 1.5rem; }
    .meta {
      font-size: 0.78rem; color: #666; margin-bottom: 0.85rem;
      display: flex; flex-wrap: wrap; gap: 0.4rem 0.7rem; align-items: center;
    }
    .meta .pill {
      background: #eef3fb; border: 1px solid #ccd6e6;
      padding: 1px 7px; border-radius: 10px;
      font-size: 0.72rem; color: #1a3a5c;
    }
    .motion {
      font-size: 0.85rem; font-weight: 500;
      margin-bottom: 0.6rem; color: #1a3a5c;
    }
    .ruling, .admin-notes, .courtcall {
      font-size: 0.85rem; line-height: 1.55;
      white-space: pre-wrap;
    }
    .section-label {
      font-size: 0.72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: #888; margin: 0.95rem 0 0.25rem;
    }
    .modal-close {
      position: absolute; top: 0.6rem; right: 0.7rem;
      width: 26px; height: 26px;
      border: none; background: none; font-size: 1.1rem;
      cursor: pointer; color: #aaa; line-height: 1;
    }
    .modal-close:hover { color: #333; }

    @media (max-width: 720px) {
      .col-time, .col-dept { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>SF Superior Court — Tentative Rulings</h1>
    <span id="stats">Loading…</span>
  </div>
  <div class="header-right">
    <button class="hbtn" id="charts-btn" title="Show charts">📊 Charts</button>
    <button class="hbtn" id="advanced-btn" title="Add custom filter">+ Filter</button>
    <button class="hbtn" id="export-btn">⬇ CSV</button>
  </div>
</header>

<div id="error-bar"></div>

<div class="toolbar" id="toolbar" style="display:none">
  <span class="chip">
    <label for="search">Search</label>
    <input type="search" id="search" placeholder="case #, title, ruling…">
  </span>
  <span class="chip">
    <label for="date-from">From</label>
    <input type="date" id="date-from">
  </span>
  <span class="chip">
    <label for="date-to">To</label>
    <input type="date" id="date-to">
  </span>
  <span class="chip">
    <label for="dept">Dept</label>
    <select id="dept"><option value="">All</option></select>
  </span>
  <span class="chip">
    <label for="judge">Judge</label>
    <select id="judge"><option value="">All</option></select>
  </span>
  <span class="chip">
    <label for="mtype">Motion type</label>
    <select id="mtype"><option value="">All</option></select>
  </span>
  <span class="chip" id="msub-chip" style="display:none">
    <label for="msub">Subtype</label>
    <select id="msub"><option value="">All</option></select>
  </span>
  <button class="btn" id="clear-btn">✕ Clear</button>
  <span class="sep"></span>
  <label class="size">Rows
    <select id="page-size">
      <option value="50">50</option>
      <option value="100">100</option>
      <option value="250">250</option>
      <option value="500">500</option>
    </select>
  </label>
</div>

<div class="filter-builder" id="filter-builder">
  <div id="filter-rows"></div>
  <button class="btn" id="add-filter-btn">+ Add filter</button>
</div>

<div class="charts-panel" id="charts-panel">
  <div class="charts-toolbar">
    <span class="chip">
      <label for="chart-granularity">Time granularity</label>
      <select id="chart-granularity">
        <option value="auto" selected>Auto</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
        <option value="yearly">Yearly</option>
      </select>
    </span>
    <span id="chart-granularity-effective" style="font-size:0.72rem;color:#888"></span>
    <button class="btn" id="add-panel-btn" style="margin-left:auto">+ Add panel</button>
    <button class="btn" id="reset-panels-btn" title="Restore default panel layout">↺ Reset</button>
  </div>
  <div class="charts-grid" id="charts-grid"></div>
</div>

<div class="result-bar" id="result-bar" style="display:none">
  <span id="result-info"></span>
  <span id="qspinner"></span>
</div>

<div class="table-wrap" id="table-wrap">
  <div id="loading">
    <div class="spinner"></div>
    <div id="load-msg">Downloading data…</div>
    <div id="load-detail"></div>
  </div>
  <table id="grid" style="display:none">
    <thead>
      <tr>
        <th class="col-dept    sortable" data-col="department">Dept</th>
        <th class="col-date    sortable sort-desc" data-col="court_date">Date</th>
        <th class="col-time">Time</th>
        <th class="col-case    sortable" data-col="case_number">Case #</th>
        <th class="col-title   sortable" data-col="case_title">Case Title</th>
        <th class="col-mtype">Motion Type</th>
        <th class="col-outcome">Outcome</th>
        <th class="col-motion">Motion Caption</th>
        <th class="col-judge   sortable" data-col="judge">Judge</th>
        <th class="col-ruling">Ruling (excerpt)</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="pager" id="pager" style="display:none">
  <button id="pg-first">«</button>
  <button id="pg-prev">‹</button>
  <span id="page-info"></span>
  <button id="pg-next">›</button>
  <button id="pg-last">»</button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">×</button>
    <h2 id="modal-title"></h2>
    <div class="meta" id="modal-meta"></div>
    <div class="motion" id="modal-motion"></div>
    <div class="ruling" id="modal-ruling"></div>
    <div class="section-label" id="modal-admin-label" style="display:none">Administrative notes</div>
    <div class="admin-notes" id="modal-admin"></div>
    <div class="section-label" id="modal-cc-label" style="display:none">Remote-appearance / CourtCall</div>
    <div class="courtcall" id="modal-cc"></div>
  </div>
</div>

<script type="module">
import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm/+esm';
import Chart from 'https://cdn.jsdelivr.net/npm/chart.js@4/auto/+esm';

// ─── Browser-side enrichment: motion type/subtype, admin split, CourtCall ────

// Each department uses slightly different boilerplate. Rules and admin-text
// boundaries below are keyed by department so adding a new dept is a matter
// of dropping in another entry. Anything not in the map falls back to the
// civil-law (Dept 302) ruleset and a generalised contestation regex.

// Motion-type rules. Order matters — first match wins.
// Each rule: [test fn, type label, optional subtype fn for Compel Discovery].
const CIVIL_LAW_MOTION_RULES = [
  [t => /\banti[-\s]?slapp\b|\bccp\s*425\.16\b|\b425\.16\b|\bspecial\s+motion\s+to\s+strike\b/i.test(t),
    'Special Motion to Strike (CCP 425.16/Anti-SLAPP)'],
  [t => /\bdemurrer\b/i.test(t), 'Demurrer'],
  [t => /\bmotion to strike\b|\bmtn to strike\b|\band motion to strike\b|\bmotion (?:and|of) (?:notice )?to strike\b/i.test(t),
    'Motion to Strike'],
  [t => /\bsummary judgment\b|\bsummary adjudication\b|\bmsj\b/i.test(t),
    'Summary Judgment / Adjudication'],
  [t => /\bjudgment on the pleadings\b/i.test(t), 'Judgment on the Pleadings'],
  [t => /\bcompel\s+arbitration\b/i.test(t), 'Compel Arbitration'],
  [t => /\bcompel\b/i.test(t), 'Compel Discovery', compelSubtype],
  [t => /\bmotion to quash\b.*\bsubpoena\b|\bquash subpoena\b/i.test(t), 'Quash Subpoena'],
  [t => /\bmotion to quash\b/i.test(t), 'Quash Service / Jurisdiction'],
  [t => /\bprotective order\b/i.test(t), 'Protective Order'],
  [t => /\bdeem.*admissions?\s+admitted\b|\brequests?\s+for\s+admissions?\s+admitted\b|\border\s+establishing\s+admissions\b|\bestablishing\s+admissions\b/i.test(t),
    'Deem RFAs Admitted'],
  [t => /\bsanctions?\b/i.test(t), 'Sanctions'],
  [t => /\battorney(?:'?s)?\s*fees?\b|\battorneys?\s*fees\b|\batty\s*fees?\b|\btax (?:memo of )?costs\b|\bstrike\s+memo\s+of\s+costs\b|\bmotion\s+(?:to|for)\s+strike\s+costs\b/i.test(t),
    'Attorney Fees / Costs'],
  [t => /\bpro hac vice\b/i.test(t), 'Pro Hac Vice'],
  [t => /\brelieved as counsel\b|\bwithdraw(?:al)? (?:as|of) (?:attorney|counsel)\b|\bwithdraw as counsel\b/i.test(t),
    'Counsel — Withdraw / Be Relieved'],
  [t => /\bset aside\b.*\b(?:default|judgment|order|dismissal)\b|\bvacate\b.*\b(?:default|judgment|order|renewal)\b|\bleave to defend\b/i.test(t),
    'Set Aside / Vacate'],
  [t => /\bclaim of exemption\b/i.test(t), 'Claim of Exemption'],
  [t => /\bright to attach\b|\bwrit of attachment\b|\battach(?:ment)? order\b/i.test(t), 'Right to Attach'],
  [t => /\border to show cause\b|\bosc\b/i.test(t), 'Order to Show Cause'],
  [t => /\bpetition\b.*\bconfirm\b.*\barb(?:itration)?\b|\bconfirm arb(?:itration)? award\b/i.test(t),
    'Petition to Confirm Arbitration Award'],
  [t => /\barbitration\b/i.test(t), 'Arbitration (other)'],
  [t => /\bgood faith settlement\b/i.test(t), 'Good Faith Settlement'],
  [t => /\bfinal approval\b/i.test(t) && !/\bclass\b|\bsettlement\b/i.test(t), 'Final Approval Hearing'],
  [t => /\bapprove(?:.*settlement)?\b|\bsettlement.*approve\b|\bclass action settlement\b|\bclass settlement\b|\bproposition\s*65\b|\bprop\.?\s*65\b|\bpreliminary approval\b|\bfinal approval\b/i.test(t),
    'Approve Settlement'],
  [t => /\bconsolidat(?:e|ion|ing)\b/i.test(t), 'Consolidate'],
  [t => /\bsever(?:ance|ed|ing)?\b|\bbifurcat(?:e|ed|ing|ion)\b/i.test(t), 'Sever / Bifurcate'],
  [t => /\bforum non conveniens\b/i.test(t), 'Forum Non Conveniens'],
  [t => /\bstay\b/i.test(t), 'Stay'],
  [t => /\bdismiss(?:al)?\b/i.test(t), 'Dismiss'],
  [t => /\breceiver\b/i.test(t), 'Receiver'],
  [t => /\bpreliminary injunction\b|\btemporary restraining order\b|\btro\b/i.test(t), 'Injunction / TRO'],
  [t => /\blis pendens\b|\bexpunge\b/i.test(t), 'Lis Pendens / Expunge'],
  [t => /\breconsider(?:ation)?\b|\bnew trial\b/i.test(t), 'Reconsideration / New Trial'],
  [t => /\bclass certificat(?:ion|e)\b|\bcertify class\b|\bcertify a class\b/i.test(t), 'Class Certification'],
  [t => /\bintervene\b|\bintervention\b/i.test(t), 'Intervene'],
  [t => /\bleave to file\b|\bleave to amend\b|\bamend complaint\b|\bfile (?:an? )?amended\b/i.test(t),
    'Leave to Amend / File'],
  [t => /\bsale of dwelling\b|\bsale of (?:real )?property\b/i.test(t), 'Sale of Dwelling / Property'],
  [t => /\bassignment of right\b|\bassignment order\b|\bassignment of rights\b/i.test(t), 'Assignment Order'],
  [t => /\brenewal of judgment\b/i.test(t), 'Renewal of Judgment'],
  [t => /\bcontempt\b/i.test(t), 'Contempt'],
  [t => /\bcontinuance\b|\badvance hearing\b|\bcontinue (?:the )?hearing\b/i.test(t), 'Continuance / Advance'],
  [t => /\b(?:to |motion to |under )seal\b|\bfile\s+(?:records\s+)?under\s+seal\b/i.test(t), 'Sealing'],
  [t => /\bchange of venue\b|\btransfer (?:of )?venue\b|\btransfer venue\b|\bmotion to transfer\b|\bvenue\b/i.test(t),
    'Venue'],
  [t => /\bcompliance hearing\b/i.test(t), 'Compliance Hearing'],
  [t => /\bwrit of mandate\b|\bpetition for writ\b/i.test(t), 'Writ of Mandate'],
  [t => /\bwrit of possession\b/i.test(t), 'Writ of Possession'],
  [t => /\benforce settlement\b|\bmotion to enforce\b/i.test(t), 'Enforce Settlement'],
  [t => /\bentry of (?:consent )?judgment\b/i.test(t), 'Entry of Judgment'],
  [t => /\bpetition\b.*\btransfer\b.*\bpayment\b|\bstructured settlement\b/i.test(t),
    'Structured Settlement Transfer'],
];

// Department → motion-rule list. Other depts (Probate, Family, Criminal,
// Asbestos, etc.) use very different vocabularies; once we have data for
// them, add a tuned ruleset here. Depts with no entry fall back to the
// civil-law list (better than nothing, surfaces a lot as Miscellaneous).
const MOTION_RULES_BY_DEPT = {
  '302': CIVIL_LAW_MOTION_RULES,
};
const MOTION_RULES_DEFAULT = CIVIL_LAW_MOTION_RULES;

function rulesForDept(dept) {
  return MOTION_RULES_BY_DEPT[dept] || MOTION_RULES_DEFAULT;
}

function compelSubtype(t) {
  if (/\barbitration\b/i.test(t)) return null; // handled by Compel Arbitration
  if (/\bfurther\b.*\b(?:response|production|interrog|admission|document)\b/i.test(t)
      || /\bfurther responses?\b/i.test(t))
    return 'Further Responses';
  if (/\bdeposition\b|\bpmq\b|\bpmk\b|\bperson most\b/i.test(t)) return 'Deposition';
  if (/\b(?:document )?production\b|\bproduce\s+documents?\b/i.test(t)) return 'Production';
  if (/\binterrogator\w+\b/i.test(t)) return 'Interrogatories';
  if (/\brequests?\s+for\s+admission|\brfa\b|\brfas\b/i.test(t)) return 'Requests for Admission';
  if (/\bsubpoena\b/i.test(t)) return 'Subpoena Compliance';
  if (/\bresponses?\s+to\b/i.test(t)) return 'Initial Responses';
  return 'Other';
}

function classifyMotion(cm, dept) {
  if (!cm) return { type: 'Miscellaneous', subtype: null };
  for (const rule of rulesForDept(dept)) {
    if (rule[0](cm)) {
      const sub = rule[2] ? rule[2](cm) : null;
      return { type: rule[1], subtype: sub };
    }
  }
  return { type: 'Miscellaneous', subtype: null };
}

// ─── Outcome classification ──────────────────────────────────────────────────
// Reads the substantive ruling text and returns one of a small fixed vocabulary.
// Order matters: more specific patterns must come before more generic ones
// (e.g. "granted in part" before "granted"; "off calendar" before "continued").
// Sustained / overruled (demurrer-specific dispositions) live under one
// "Granted / Sustained" umbrella so charts can group them together while still
// preserving the distinction via subtype — same pattern as motion type/subtype.
const OUTCOME_RULES = [
  // Procedural / non-merits dispositions first.
  [t => /\boff\s+calendar\b/i.test(t),                         'Off calendar', null],
  [t => /\bwithdrawn\b|\btaken\s+off\s+calendar\b/i.test(t),   'Withdrawn',    null],
  [t => /\bmoot(?:ed)?\b/i.test(t),                            'Moot',         null],
  [t => /\btransferr?ed\b/i.test(t),                           'Transferred',  null],
  [t => /\bcontinued\b|\bcontinuance\s+granted\b/i.test(t),    'Continued',    null],
  [t => /\bunder\s+submission\b|\bsubmitted\s+for\s+(?:decision|ruling)\b/i.test(t),
    'Under submission', null],
  // Granted-family. "Granted in part" wins over plain granted; sustained
  // (with/without leave) lives here too as a subtype.
  [t => /\bgranted\b.{0,40}\bin\s+part\b/i.test(t),
    'Granted / Sustained', 'Granted in part'],
  [t => /\bsustained\b.{0,40}\bwith\s+leave\s+to\s+amend\b/i.test(t),
    'Granted / Sustained', 'Sustained with leave to amend'],
  [t => /\bsustained\b.{0,40}\bwithout\s+leave\b/i.test(t),
    'Granted / Sustained', 'Sustained without leave'],
  [t => /\bsustained\b/i.test(t),                              'Granted / Sustained', 'Sustained'],
  [t => /\bgranted\b/i.test(t),                                'Granted / Sustained', 'Granted'],
  // Denied-family.
  [t => /\bdenied\b.{0,40}\bin\s+part\b/i.test(t),             'Denied', 'Denied in part'],
  [t => /\bdenied\s+without\s+prejudice\b/i.test(t),           'Denied', 'Denied without prejudice'],
  [t => /\bdenied\b/i.test(t),                                 'Denied', null],
  [t => /\boverruled\b/i.test(t),                              'Denied', 'Overruled'],
];

function classifyOutcome(rulingText) {
  if (!rulingText) return { outcome: 'Unknown', subtype: null };
  // Look at the substantive ruling only — boilerplate "Any party who contests…"
  // never matches our terms so this is mostly defensive.
  const text = rulingText;
  for (const [test, outcome, subtype] of OUTCOME_RULES) {
    if (test(text)) return { outcome, subtype };
  }
  return { outcome: 'Other', subtype: null };
}

// One outcome per (case_number, court_date, calendar_matter) — keyed so we
// don't re-classify on every render.
const OUTCOME_CACHE = new Map();
function lookupOutcome(rulingText) {
  if (!rulingText) return { outcome: 'Unknown', subtype: null };
  // Cache key: hash by ruling text length + first/last 60 chars (full text
  // can be 5KB+; this is enough collision resistance for our 50K rows).
  const key = `${rulingText.length}|${rulingText.slice(0, 60)}|${rulingText.slice(-60)}`;
  let cls = OUTCOME_CACHE.get(key);
  if (!cls) { cls = classifyOutcome(rulingText); OUTCOME_CACHE.set(key, cls); }
  return cls;
}

// Department → admin-block boundary regex. The substantive ruling ends just
// before this phrase; everything from there onward is contestation /
// remote-appearance / boilerplate. Add new depts as their phrasing is
// observed; depts without an entry fall back to a generalised regex covering
// the most common SFSC contestation language.
const ADMIN_BOUNDARIES = {
  '302': /\s*Any\s+part(?:y|ies)\s+who\s+contests?\s+a\s+tentative\s+ruling/i,
};
const ADMIN_BOUNDARY_DEFAULT = new RegExp(
  '\\s*(?:' +
    'Any\\s+part(?:y|ies)\\s+who\\s+contests?\\s+a\\s+tentative\\s+ruling|' +
    'If\\s+(?:a|any|the)\\s+part(?:y|ies)\\s+(?:intends|wishes|wants|desires)\\s+to\\s+contest|' +
    'To\\s+contest\\s+(?:the|this)\\s+tentative|' +
    'Any\\s+part(?:y|ies)\\s+(?:intending|wishing)\\s+to\\s+(?:oppose|contest)|' +
    'Tentative\\s+ruling[s]?\\s+will\\s+become\\s+(?:the\\s+)?final|' +
    'Pursuant\\s+to\\s+(?:CRC|California\\s+Rule(?:s)?\\s+of\\s+Court|Local\\s+Rule)' +
  ')',
  'i'
);

function adminBoundary(dept) {
  return ADMIN_BOUNDARIES[dept] || ADMIN_BOUNDARY_DEFAULT;
}

// CourtCall / Zoom / remote-appearance prose lives inside the admin block.
// Generic — same vendors and meeting-platform names regardless of dept.
const COURTCALL_RE = /(?:CourtCall|9:00\s*a\.m\.\s+Discovery\s+calendar|appear\s+remotely|Zoom\b|videoconference|sfsuperiorcourt\.org|telephonic\s+appearance|remote\s+appearance|microsoft\s+teams\b|webex\b)/i;

function splitRuling(full, dept) {
  if (!full) return { ruling: '', admin: '', courtcall: '' };
  const m = adminBoundary(dept).exec(full);
  let substantive = full, adminBlock = '';
  if (m) {
    substantive = full.slice(0, m.index).replace(/[\s.,;:]+$/, '');
    adminBlock  = full.slice(m.index).trim();
  }
  // Inside admin, peel off the CourtCall paragraph if present.
  let admin = adminBlock, courtcall = '';
  if (adminBlock && COURTCALL_RE.test(adminBlock)) {
    const sentences = adminBlock.split(/(?<=[.!?])\s+(?=[A-Z(])/);
    const cc = [], rest = [];
    for (const s of sentences) {
      (COURTCALL_RE.test(s) ? cc : rest).push(s);
    }
    courtcall = cc.join(' ').trim();
    admin     = rest.join(' ').trim();
  }
  return { ruling: substantive.trim(), admin, courtcall };
}

// ─── State ───────────────────────────────────────────────────────────────────
let conn, totalRows = 0, currentPage = 0, lastCount = 0, PAGE_SIZE = 50;
let sortCol = 'court_date', sortDir = 'DESC', rows = [];
const $ = id => document.getElementById(id);

const searchEl  = $('search'),  dateFrom  = $('date-from'), dateTo = $('date-to');
const deptEl    = $('dept'),    judgeEl   = $('judge');
const mtypeEl   = $('mtype'),   msubEl    = $('msub'), msubChip = $('msub-chip');

// Categorisation cache (populated once per page load by classifyAll). Declared
// here — not next to its consumers — because the top-level `try` block below
// calls classifyAll() before its declaration site would otherwise be reached,
// and a `let` in TDZ would crash with "Cannot access 'MTYPE_CACHE' before
// initialization". Two-level so departments can disagree on classification of
// the same calendar_matter string without one stomping the other.
const MTYPE_CACHE = new Map(); // dept -> Map(calendar_matter -> {type, subtype})

// Custom filters added via "+ Add filter".
let customFilters = []; // [{id, col, op, value}]
let nextFilterId = 1;
const FILTER_COLS = [
  ['case_number',     'Case Number',      ['contains', 'is', 'is not']],
  ['case_title',      'Case Title',       ['contains', 'is', 'is not']],
  ['court_date',      'Court Date',       ['on', 'before', 'after', 'between']],
  ['hearing_time',    'Hearing Time',     ['is', 'is not', 'contains']],
  ['calendar_matter', 'Motion Caption',   ['contains', 'is', 'is not']],
  ['motion_type',     'Motion Type',      ['is', 'is not']],
  ['motion_subtype',  'Motion Subtype',   ['is', 'is not', 'contains']],
  ['judge',           'Judge',            ['is', 'is not', 'contains']],
  ['department',      'Department',       ['is', 'is not']],
  // Outcome filtering happens in JS post-fetch (the classifier reads ruling
  // text), see runQuery + outcomeFilterMatches.
  ['outcome',         'Outcome',          ['is', 'is not']],
  ['outcome_subtype', 'Outcome subtype',  ['is', 'is not', 'contains']],
  ['ruling',          'Ruling text',      ['contains', 'does not contain']],
  ['admin_notes',     'Admin notes',      ['contains', 'does not contain']],
  ['courtcall',       'Remote / CourtCall info', ['contains', 'does not contain']],
];

// ─── Init ────────────────────────────────────────────────────────────────────
try {
  $('load-msg').textContent = 'Downloading data…';
  const res = await fetch('./tentatives.parquet');
  if (!res.ok) throw new Error(`HTTP ${res.status} fetching tentatives.parquet`);

  let buf;
  if (res.body) {
    const total = +res.headers.get('Content-Length') || 0;
    const reader = res.body.getReader();
    const chunks = []; let received = 0;
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value); received += value.length;
      if (total) $('load-detail').textContent =
        `${(received/1e6).toFixed(1)} / ${(total/1e6).toFixed(1)} MB`;
    }
    buf = new Uint8Array(received); let off = 0;
    for (const c of chunks) { buf.set(c, off); off += c.length; }
  } else {
    buf = new Uint8Array(await res.arrayBuffer());
  }

  $('load-msg').textContent = 'Initializing database…';
  $('load-detail').textContent = '';
  const bundles = duckdb.getJsDelivrBundles();
  const bundle  = await duckdb.selectBundle(bundles);
  const wUrl    = URL.createObjectURL(
    new Blob([`importScripts("${bundle.mainWorker}");`], { type: 'text/javascript' })
  );
  const db = new duckdb.AsyncDuckDB(new duckdb.VoidLogger(), new Worker(wUrl));
  await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
  URL.revokeObjectURL(wUrl);
  await db.registerFileBuffer('data.parquet', buf);
  conn = await db.connect();

  const s = (await conn.query(
    `SELECT COUNT(*) n, MIN(court_date) lo, MAX(court_date) hi FROM 'data.parquet'`
  )).toArray()[0];
  totalRows = Number(s.n);
  $('stats').textContent = `${totalRows.toLocaleString()} rulings · ${s.lo} → ${s.hi}`;

  for (const r of (await conn.query(
    `SELECT DISTINCT department FROM 'data.parquet' WHERE department IS NOT NULL ORDER BY department`
  )).toArray()) deptEl.appendChild(new Option(`Dept ${r.department}`, r.department));

  for (const r of (await conn.query(
    `SELECT DISTINCT judge FROM 'data.parquet' WHERE judge IS NOT NULL AND judge!='' ORDER BY judge`
  )).toArray()) judgeEl.appendChild(new Option(r.judge, r.judge));

  // Motion-type dropdown — sorted by frequency in current dataset.
  const motionCounts = await classifyAll();
  const sortedTypes = [...motionCounts.entries()].sort((a, b) => b[1] - a[1]);
  for (const [t, n] of sortedTypes) {
    mtypeEl.appendChild(new Option(`${t} (${n.toLocaleString()})`, t));
  }

  dateFrom.value = s.lo; dateTo.value = s.hi;

  $('loading').style.display = 'none';
  $('grid').style.display = '';
  $('toolbar').style.display = '';
  $('result-bar').style.display = '';
  $('pager').style.display = '';

  restoreState();

  document.querySelectorAll('th.sortable').forEach(th =>
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      sortDir = sortCol === col && sortDir === 'DESC' ? 'ASC' : 'DESC';
      sortCol = col;
      document.querySelectorAll('th.sortable').forEach(h =>
        h.classList.remove('sort-asc', 'sort-desc'));
      th.classList.add(sortDir === 'ASC' ? 'sort-asc' : 'sort-desc');
      runQuery(0);
    })
  );

  await runQuery(0);

} catch (err) {
  $('loading').style.display = 'none';
  const bar = $('error-bar');
  bar.style.display = 'block';
  bar.textContent = 'Failed to load data: ' + err.message;
  console.error(err);
}

// ─── Categorisation ──────────────────────────────────────────────────────────
// Populates MTYPE_CACHE once per page load. The dropdown's frequency labels
// reflect parquet-wide counts; per-row tagging at render time reads the cache.

async function classifyAll() {
  const all = (await conn.query(
    `SELECT department, calendar_matter, COUNT(*) n
     FROM 'data.parquet' GROUP BY department, calendar_matter`
  )).toArray();
  const counts = new Map(); // type -> count
  for (const r of all) {
    const dept = r.department || '';
    const cm   = r.calendar_matter || '';
    const cls  = classifyMotion(cm, dept);
    let inner = MTYPE_CACHE.get(dept);
    if (!inner) { inner = new Map(); MTYPE_CACHE.set(dept, inner); }
    inner.set(cm, cls);
    counts.set(cls.type, (counts.get(cls.type) || 0) + Number(r.n));
  }
  // Q4 (B): any final type below 3 → Miscellaneous.
  const smallSet = new Set(
    [...counts.entries()].filter(([, n]) => n < 3).map(([t]) => t)
  );
  if (smallSet.size) {
    let folded = 0;
    for (const t of smallSet) folded += counts.get(t) || 0;
    for (const inner of MTYPE_CACHE.values()) {
      for (const [cm, cls] of inner) {
        if (smallSet.has(cls.type)) {
          inner.set(cm, { type: 'Miscellaneous', subtype: null });
        }
      }
    }
    counts.set('Miscellaneous', (counts.get('Miscellaneous') || 0) + folded);
    for (const t of smallSet) counts.delete(t);
  }
  return counts;
}

function lookupMotion(dept, cm) {
  const inner = MTYPE_CACHE.get(dept || '');
  return (inner && inner.get(cm || '')) || classifyMotion(cm || '', dept);
}

// ─── Filtering ───────────────────────────────────────────────────────────────
// Two-stage: SQL WHERE on parquet columns, then in-JS filter for derived
// columns (motion_type, motion_subtype, courtcall). For chip filters we mostly
// stay SQL-only; for motion-type we precompute the matching calendar_matters
// and inline an IN list, which keeps queries fast even on the full 50K rows.

function escapeSql(s) { return (s ?? '').replace(/'/g, "''"); }

function calendarMattersForType(type) {
  if (!type) return null;
  const out = new Set();
  for (const inner of MTYPE_CACHE.values()) {
    for (const [cm, cls] of inner) {
      if (cls.type === type) out.add(cm);
    }
  }
  return [...out];
}

function calendarMattersForSubtype(type, sub) {
  if (!type || !sub) return null;
  const out = new Set();
  for (const inner of MTYPE_CACHE.values()) {
    for (const [cm, cls] of inner) {
      if (cls.type === type && cls.subtype === sub) out.add(cm);
    }
  }
  return [...out];
}

function buildWhere() {
  const q     = escapeSql(searchEl.value.trim());
  const from  = dateFrom.value, to = dateTo.value;
  const dept  = deptEl.value, judge = judgeEl.value;
  const mtype = mtypeEl.value, msub = msubEl.value;
  const parts = [];
  if (from)  parts.push(`court_date >= '${from}'`);
  if (to)    parts.push(`court_date <= '${to}'`);
  if (dept)  parts.push(`department = '${escapeSql(dept)}'`);
  if (judge) parts.push(`judge = '${escapeSql(judge)}'`);
  if (q)     parts.push(`(case_number ILIKE '%${q}%' OR case_title ILIKE '%${q}%' OR ruling ILIKE '%${q}%' OR calendar_matter ILIKE '%${q}%')`);
  if (mtype) {
    const cms = msub ? calendarMattersForSubtype(mtype, msub) : calendarMattersForType(mtype);
    if (cms?.length) {
      // Chunk to avoid hitting expression length limits on very common types.
      const escaped = cms.map(c => `'${escapeSql(c || '')}'`).join(',');
      parts.push(`COALESCE(calendar_matter, '') IN (${escaped})`);
    } else {
      parts.push('FALSE');
    }
  }
  for (const f of customFilters) {
    const sql = filterToSql(f);
    if (sql) parts.push(sql);
  }
  return parts.length ? parts.join(' AND ') : 'TRUE';
}

function filterToSql(f) {
  const v = (f.value ?? '').trim();
  // Outcome filters can't be expressed in plain SQL (the classifier reads
  // ruling text). They're applied after the SQL pass — buildWhere returns
  // them via a sentinel so runQuery can post-filter.
  if (f.col === 'outcome' || f.col === 'outcome_subtype') return null;
  // Some columns are derived (browser-side); for those we resolve via the
  // calendar_matter cache so the WHERE clause stays SQL-shaped.
  if (f.col === 'motion_type' || f.col === 'motion_subtype') {
    if (!v) return null;
    const cms = f.col === 'motion_type'
      ? calendarMattersForType(v)
      : (() => {
          // motion_subtype filter without a type: scan all types
          const out = new Set();
          for (const inner of MTYPE_CACHE.values()) {
            for (const [cm, cls] of inner) {
              if (cls.subtype === v) out.add(cm);
            }
          }
          return [...out];
        })();
    if (!cms?.length) return 'FALSE';
    const list = cms.map(c => `'${escapeSql(c || '')}'`).join(',');
    return f.op === 'is not'
      ? `COALESCE(calendar_matter, '') NOT IN (${list})`
      : `COALESCE(calendar_matter, '') IN (${list})`;
  }
  if (f.col === 'courtcall') {
    // Approximation: if any CourtCall keyword appears in the full ruling.
    const expr = `(ruling ILIKE '%CourtCall%' OR ruling ILIKE '%appear remotely%' OR ruling ILIKE '%Zoom%' OR ruling ILIKE '%sfsuperiorcourt.org%' OR ruling ILIKE '%videoconference%')`;
    return f.op === 'does not contain' ? `NOT ${expr}` : expr;
  }
  if (f.col === 'admin_notes') {
    // Admin notes live after the "Any party who contests…" boundary, which we
    // split out at display time. As a SQL approximation we require both the
    // boundary phrase and the search term to appear in the ruling text.
    const ev = escapeSql(v);
    if (!ev) return null;
    const boundary = "ruling ILIKE '%Any part%who contest%tentative ruling%'";
    const hit      = `ruling ILIKE '%${ev}%'`;
    return f.op === 'does not contain'
      ? `(NOT (${boundary}) OR NOT (${hit}))`
      : `${boundary} AND ${hit}`;
  }
  if (!v && f.op !== 'is' && f.op !== 'is not') return null;
  const col = f.col;
  const ev = escapeSql(v);
  switch (f.op) {
    case 'is':              return `${col} = '${ev}'`;
    case 'is not':          return `(${col} IS NULL OR ${col} <> '${ev}')`;
    case 'contains':        return `${col} ILIKE '%${ev}%'`;
    case 'does not contain':return `(${col} IS NULL OR ${col} NOT ILIKE '%${ev}%')`;
    case 'on':              return `${col} = '${ev}'`;
    case 'before':          return `${col} < '${ev}'`;
    case 'after':           return `${col} > '${ev}'`;
    case 'between': {
      const [a, b] = v.split('..').map(s => s.trim());
      if (!a || !b) return null;
      return `${col} BETWEEN '${escapeSql(a)}' AND '${escapeSql(b)}'`;
    }
  }
  return null;
}

// ─── Query ───────────────────────────────────────────────────────────────────
async function runQuery(page = 0) {
  if (!conn) return;
  currentPage = page;
  const where = buildWhere(), offset = page * PAGE_SIZE;
  const oFilters = outcomeFilters();
  $('qspinner').classList.add('on');
  saveState();
  try {
    if (oFilters.length) {
      // Outcome filters live outside SQL. Pull a wider page, classify in JS,
      // then slice. Counting accurately requires scanning the full filtered
      // set — we do it once per query which is ~O(50K rules-evals).
      const [cntR, allR] = await Promise.all([
        conn.query(`SELECT COUNT(*) n FROM 'data.parquet' WHERE ${where}`),
        conn.query(`
          SELECT department, case_number, case_title, court_date, hearing_time,
                 calendar_matter, judge, ruling
          FROM 'data.parquet' WHERE ${where}
          ORDER BY ${sortCol} ${sortDir}, case_number
        `),
      ]);
      const allRows = allR.toArray().filter(outcomeFilterMatches);
      lastCount = allRows.length;
      rows = allRows.slice(offset, offset + PAGE_SIZE);
      renderTable(rows);
      renderPager(lastCount, page);
      $('result-info').textContent =
        `${lastCount.toLocaleString()} row${lastCount !== 1 ? 's' : ''}` +
        ` (outcome-filtered from ${Number(cntR.toArray()[0].n).toLocaleString()})`;
    } else {
      const [cntR, rowsR] = await Promise.all([
        conn.query(`SELECT COUNT(*) n FROM 'data.parquet' WHERE ${where}`),
        conn.query(`
          SELECT department, case_number, case_title, court_date, hearing_time,
                 calendar_matter, judge, ruling
          FROM 'data.parquet' WHERE ${where}
          ORDER BY ${sortCol} ${sortDir}, case_number
          LIMIT ${PAGE_SIZE} OFFSET ${offset}
        `),
      ]);
      lastCount = Number(cntR.toArray()[0].n);
      rows = rowsR.toArray();
      renderTable(rows);
      renderPager(lastCount, page);
      $('result-info').textContent =
        `${lastCount.toLocaleString()} row${lastCount !== 1 ? 's' : ''}` +
        (lastCount !== totalRows ? ` of ${totalRows.toLocaleString()} total` : '');
    }

    if ($('charts-panel').classList.contains('open')) {
      refreshCharts(where);
    }
  } finally { $('qspinner').classList.remove('on'); }
}

// ─── Render ──────────────────────────────────────────────────────────────────
function outcomeClass(outcome) {
  if (!outcome) return 'outcome-other';
  if (outcome.startsWith('Granted'))  return 'outcome-granted';
  if (outcome === 'Denied')           return 'outcome-denied';
  if (outcome === 'Continued')        return 'outcome-continued';
  if (outcome === 'Off calendar' || outcome === 'Withdrawn') return 'outcome-off';
  return 'outcome-other';
}

function renderTable(data) {
  const tbody = $('tbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="no-data">No rulings match your filters.</td></tr>';
    return;
  }
  tbody.innerHTML = data.map((r, i) => {
    const m = lookupMotion(r.department, r.calendar_matter);
    const sub = m.subtype ? `<div class="mtype-sub">${esc(m.subtype)}</div>` : '';
    const o = lookupOutcome(splitRuling(r.ruling, r.department).ruling);
    const oSub = o.subtype ? `<div class="mtype-sub">${esc(o.subtype)}</div>` : '';
    return `<tr data-idx="${i}">
      <td class="col-dept">${esc(r.department)}</td>
      <td class="col-date">${r.court_date ?? ''}</td>
      <td class="col-time">${r.hearing_time ?? ''}</td>
      <td class="col-case">${esc(r.case_number)}</td>
      <td class="col-title">${esc(r.case_title)}</td>
      <td class="col-mtype"><span class="mtype-pill">${esc(m.type)}</span>${sub}</td>
      <td class="col-outcome"><span class="outcome-pill ${outcomeClass(o.outcome)}">${esc(o.outcome)}</span>${oSub}</td>
      <td class="col-motion">${esc(r.calendar_matter)}</td>
      <td class="col-judge">${esc(r.judge)}</td>
      <td class="col-ruling">${esc((splitRuling(r.ruling, r.department).ruling).slice(0, 140))}</td>
    </tr>`;
  }).join('');
  window._rows = data;
  tbody.querySelectorAll('tr').forEach(tr =>
    tr.addEventListener('click', () => openModal(window._rows[+tr.dataset.idx]))
  );
}

function renderPager(total, page) {
  const pages = Math.ceil(total / PAGE_SIZE) || 1;
  $('page-info').textContent = `Page ${page + 1} of ${pages.toLocaleString()}`;
  $('pg-first').disabled = page === 0;
  $('pg-prev').disabled  = page === 0;
  $('pg-next').disabled  = page >= pages - 1;
  $('pg-last').disabled  = page >= pages - 1;
}

['pg-first','pg-prev','pg-next','pg-last'].forEach(id =>
  $(id).addEventListener('click', () => {
    if ($(id).disabled) return;
    const pages = Math.ceil(lastCount / PAGE_SIZE) || 1;
    const p = id === 'pg-first' ? 0 : id === 'pg-prev' ? currentPage - 1
            : id === 'pg-next'  ? currentPage + 1 : pages - 1;
    runQuery(Math.max(0, Math.min(p, pages - 1)));
  })
);

$('page-size').addEventListener('change', () => {
  PAGE_SIZE = +$('page-size').value; runQuery(0);
});

// ─── Charts (Chart.js) ───────────────────────────────────────────────────────
// Panels are user-configurable: pick a preset (e.g. "Top motion types",
// "% Granted by motion type", "Outcome breakdown") and the panel renders
// itself. Layout persists in localStorage. The four legacy panels (time
// series, top motion types, top judges, motion composition) are the default
// preset stack.

const charts = {};
function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}
function makeChart(id, config) {
  const ctx = $(id);
  if (!ctx) return;
  destroyChart(id);
  charts[id] = new Chart(ctx, config);
}

const PALETTE = ['#1a3a5c', '#2e6da4', '#5a8fc8', '#2a7a4a', '#7aa6d2',
                 '#b8860b', '#a3543c', '#6f4e7c', '#4f8d76', '#a87a4a',
                 '#8a7090', '#5588aa'];

// Time-bucket helper. "Auto" picks the granularity from the date span; if
// the range is inside a single calendar month, force daily.
function pickGranularity(mode, from, to) {
  if (mode && mode !== 'auto') return mode;
  if (!from || !to) return 'monthly';
  const a = new Date(from + 'T12:00:00');
  const b = new Date(to   + 'T12:00:00');
  if (a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth()) return 'daily';
  const days = Math.round((b - a) / 86400000);
  if (days <= 31)         return 'daily';
  if (days <= 6 * 30)     return 'weekly';
  if (days <= 5 * 365)    return 'monthly';
  return 'yearly';
}

// SQL expression that buckets court_date at the chosen granularity. Always
// returns VARCHAR so the JS side can treat keys as strings uniformly.
function dateBucketSql(g) {
  if (g === 'daily')   return "strftime(CAST(court_date AS DATE), '%Y-%m-%d')";
  if (g === 'weekly')  return "strftime(date_trunc('week', CAST(court_date AS DATE)), '%Y-%m-%d')";
  if (g === 'monthly') return "strftime(CAST(court_date AS DATE), '%Y-%m')";
  return "strftime(CAST(court_date AS DATE), '%Y')";
}

function granularityLabel(g) {
  return ({ daily: 'day', weekly: 'week (ISO, Mon-start)', monthly: 'month', yearly: 'year' })[g] || g;
}

// Shared chart options. Horizontal bars get autoSkip:false so every bar
// label is visible (the previous default silently dropped half of them when
// the chart shrank, leaving "interstitial" unlabeled bars).
function chartOpts(extra = {}) {
  const horizontal = extra.indexAxis === 'y';
  const labelTrunc = (s) => {
    s = String(s ?? '');
    return s.length > 32 ? s.slice(0, 30) + '…' : s;
  };
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: extra.legend !== false, position: 'bottom',
                labels: { font: { size: 10 }, boxWidth: 10 } },
      tooltip: {
        mode: 'index', intersect: false,
        callbacks: extra.tooltip?.callbacks,
      },
    },
    interaction: { mode: 'nearest', intersect: false },
    scales: {
      x: {
        grid: { color: '#eef0f4' },
        ticks: { font: { size: 10 }, ...(horizontal ? {} : { autoSkip: true, maxRotation: 0 }), ...(extra.xTicks || {}) },
        ...(extra.x || {}),
      },
      y: {
        grid: { color: '#eef0f4' },
        beginAtZero: true,
        stacked: !!extra.stacked,
        ticks: {
          font: { size: 10 },
          ...(horizontal
            ? { autoSkip: false, callback: function(v) { return labelTrunc(this.getLabelForValue(v)); } }
            : {}),
          ...(extra.yTicks || {}),
        },
        ...(extra.y || {}),
      },
    },
    indexAxis: extra.indexAxis || 'x',
  };
}

// ─── Panel presets ────────────────────────────────────────────────────────────
// Each preset is a self-contained panel renderer: takes the current SQL
// WHERE clause + global granularity + per-panel config, returns nothing
// (writes directly to its canvas via makeChart).

const PANEL_PRESETS = {
  'time-series': {
    label: 'Rulings over time',
    wide: false,
    defaults: {},
    title:    (cfg, g) => `Rulings per ${granularityLabel(g)}`,
    render:   async (panel, where, g) => {
      const bucket = dateBucketSql(g);
      const r = (await conn.query(
        `SELECT ${bucket} m, COUNT(*) n FROM 'data.parquet' WHERE ${where}
         GROUP BY m ORDER BY m`)).toArray();
      makeChart(panel.canvasId, {
        type: 'line',
        data: { labels: r.map(x => x.m), datasets: [{
          label: 'Rulings', data: r.map(x => Number(x.n)),
          borderColor: '#1a3a5c', backgroundColor: 'rgba(26,58,92,0.15)',
          tension: 0.25, pointRadius: 0, fill: true, borderWidth: 1.4,
        }] },
        options: chartOpts({ legend: false, x: { type: 'category', ticks: { maxTicksLimit: 14 } } }),
      });
    },
  },

  'top-motion-types': {
    label: 'Top motion types (bar)',
    wide: false,
    defaults: { topN: 12 },
    title:    (cfg) => `Top ${cfg.topN || 12} motion types`,
    configFields: [['topN', 'Top N', 'number']],
    render:   async (panel, where) => {
      const rows = (await conn.query(
        `SELECT department, calendar_matter, COUNT(*) n FROM 'data.parquet'
         WHERE ${where} GROUP BY department, calendar_matter`)).toArray();
      const counts = new Map();
      for (const r of rows) {
        const t = lookupMotion(r.department, r.calendar_matter).type;
        counts.set(t, (counts.get(t) || 0) + Number(r.n));
      }
      const top = [...counts.entries()].sort((a, b) => b[1] - a[1])
        .slice(0, panel.cfg.topN || 12);
      makeChart(panel.canvasId, {
        type: 'bar',
        data: { labels: top.map(r => r[0]), datasets: [{
          label: 'Rulings', data: top.map(r => r[1]),
          backgroundColor: '#2e6da4', borderRadius: 3,
        }] },
        options: chartOpts({ indexAxis: 'y', legend: false, x: { beginAtZero: true } }),
      });
    },
  },

  'top-judges': {
    label: 'Top judges (bar)',
    wide: false,
    defaults: { topN: 12 },
    title:    (cfg) => `Top ${cfg.topN || 12} judges`,
    configFields: [['topN', 'Top N', 'number']],
    render:   async (panel, where) => {
      const r = (await conn.query(
        `SELECT COALESCE(judge, '(unspecified)') j, COUNT(*) n FROM 'data.parquet'
         WHERE ${where} GROUP BY j ORDER BY n DESC LIMIT ${+panel.cfg.topN || 12}`)).toArray();
      makeChart(panel.canvasId, {
        type: 'bar',
        data: { labels: r.map(x => x.j), datasets: [{
          label: 'Rulings', data: r.map(x => Number(x.n)),
          backgroundColor: '#2a7a4a', borderRadius: 3,
        }] },
        options: chartOpts({ indexAxis: 'y', legend: false, x: { beginAtZero: true } }),
      });
    },
  },

  'motion-type-stack': {
    label: 'Motion-type composition over time (stacked)',
    wide: true,
    defaults: { topN: 6 },
    title:    (cfg, g) => `Top ${cfg.topN || 6} motion types per ${granularityLabel(g)}`,
    configFields: [['topN', 'Top N', 'number']],
    render:   async (panel, where, g) => {
      const bucket = dateBucketSql(g);
      const rows = (await conn.query(
        `SELECT ${bucket} b, department, calendar_matter, COUNT(*) n
         FROM 'data.parquet' WHERE ${where}
         GROUP BY b, department, calendar_matter ORDER BY b`)).toArray();
      const buckets = []; const seen = new Set();
      const map = new Map(); // bucket -> Map(type -> count)
      for (const r of rows) {
        if (!seen.has(r.b)) { buckets.push(r.b); seen.add(r.b); }
        const t = lookupMotion(r.department, r.calendar_matter).type;
        if (!map.has(r.b)) map.set(r.b, new Map());
        const m = map.get(r.b); m.set(t, (m.get(t) || 0) + Number(r.n));
      }
      const totals = new Map();
      for (const m of map.values()) for (const [t, n] of m) totals.set(t, (totals.get(t) || 0) + n);
      const top = [...totals.entries()].sort((a, b) => b[1] - a[1])
        .slice(0, panel.cfg.topN || 6).map(r => r[0]);
      const datasets = top.map((t, i) => ({
        label: t,
        data: buckets.map(b => map.get(b)?.get(t) || 0),
        backgroundColor: PALETTE[i % PALETTE.length],
        borderColor: PALETTE[i % PALETTE.length],
        fill: true, tension: 0.25, pointRadius: 0, borderWidth: 0,
      }));
      makeChart(panel.canvasId, {
        type: 'line',
        data: { labels: buckets, datasets },
        options: chartOpts({ x: { type: 'category', ticks: { maxTicksLimit: 16 } },
                             y: { stacked: true }, stacked: true }),
      });
    },
  },

  'outcome-bar': {
    label: 'Outcome breakdown (bar)',
    wide: false,
    defaults: {},
    title:    () => 'Outcome breakdown',
    render:   async (panel, where) => {
      const rows = (await conn.query(
        `SELECT department, ruling FROM 'data.parquet' WHERE ${where}
         AND ruling IS NOT NULL`)).toArray();
      const counts = new Map();
      for (const r of rows) {
        const o = lookupOutcome(r.ruling).outcome;
        counts.set(o, (counts.get(o) || 0) + 1);
      }
      const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1]);
      makeChart(panel.canvasId, {
        type: 'bar',
        data: { labels: sorted.map(r => r[0]), datasets: [{
          label: 'Rulings',
          data: sorted.map(r => r[1]),
          backgroundColor: sorted.map((_, i) => PALETTE[i % PALETTE.length]),
          borderRadius: 3,
        }] },
        options: chartOpts({ indexAxis: 'y', legend: false, x: { beginAtZero: true } }),
      });
    },
  },

  'outcome-pct-by-type': {
    label: '% of one outcome by motion type',
    wide: false,
    defaults: { outcome: 'Granted / Sustained', topN: 12 },
    title:    (cfg) => `% ${cfg.outcome || 'Granted / Sustained'} by motion type`,
    configFields: [
      ['outcome', 'Outcome', 'outcome'],
      ['topN',    'Top N',   'number'],
    ],
    render:   async (panel, where) => {
      const target = panel.cfg.outcome || 'Granted / Sustained';
      const rows = (await conn.query(
        `SELECT department, calendar_matter, ruling FROM 'data.parquet'
         WHERE ${where} AND ruling IS NOT NULL`)).toArray();
      const total = new Map(), match = new Map();
      for (const r of rows) {
        const t = lookupMotion(r.department, r.calendar_matter).type;
        total.set(t, (total.get(t) || 0) + 1);
        if (lookupOutcome(r.ruling).outcome === target) {
          match.set(t, (match.get(t) || 0) + 1);
        }
      }
      // Order by total volume so the user sees the high-frequency motions
      // first; min N=20 to avoid noisy 100%-from-1-row entries dominating.
      const ranked = [...total.entries()]
        .filter(([, n]) => n >= 20)
        .sort((a, b) => b[1] - a[1])
        .slice(0, panel.cfg.topN || 12)
        .map(([t, n]) => [t, (match.get(t) || 0) / n * 100, match.get(t) || 0, n]);
      makeChart(panel.canvasId, {
        type: 'bar',
        data: { labels: ranked.map(r => r[0]), datasets: [{
          label: `% ${target}`,
          data: ranked.map(r => r[1]),
          backgroundColor: '#2e6da4', borderRadius: 3,
        }] },
        options: chartOpts({
          indexAxis: 'y', legend: false,
          x: { beginAtZero: true, max: 100,
               ticks: { callback: v => v + '%' } },
          tooltip: { callbacks: {
            label: ctx => {
              const [, , m, t] = ranked[ctx.dataIndex];
              return ` ${ctx.parsed.x.toFixed(1)}%  (${m} of ${t})`;
            },
          } },
        }),
      });
    },
  },

  'outcome-stack-by-type': {
    label: 'Outcome composition by motion type (stacked)',
    wide: true,
    defaults: { topN: 10 },
    title:    (cfg) => `Outcome composition — top ${cfg.topN || 10} motion types`,
    configFields: [['topN', 'Top N motion types', 'number']],
    render:   async (panel, where) => {
      const rows = (await conn.query(
        `SELECT department, calendar_matter, ruling FROM 'data.parquet'
         WHERE ${where} AND ruling IS NOT NULL`)).toArray();
      const byType = new Map();      // type -> Map(outcome -> count)
      const typeTotals = new Map();
      for (const r of rows) {
        const t = lookupMotion(r.department, r.calendar_matter).type;
        const o = lookupOutcome(r.ruling).outcome;
        if (!byType.has(t)) byType.set(t, new Map());
        const m = byType.get(t);
        m.set(o, (m.get(o) || 0) + 1);
        typeTotals.set(t, (typeTotals.get(t) || 0) + 1);
      }
      const types = [...typeTotals.entries()].sort((a, b) => b[1] - a[1])
        .slice(0, panel.cfg.topN || 10).map(r => r[0]);
      const allOutcomes = new Set();
      for (const m of byType.values()) for (const o of m.keys()) allOutcomes.add(o);
      const outcomes = [...allOutcomes];
      const datasets = outcomes.map((o, i) => ({
        label: o,
        data: types.map(t => byType.get(t)?.get(o) || 0),
        backgroundColor: PALETTE[i % PALETTE.length],
      }));
      makeChart(panel.canvasId, {
        type: 'bar',
        data: { labels: types, datasets },
        options: chartOpts({
          indexAxis: 'y',
          x: { stacked: true, beginAtZero: true },
          y: { stacked: true },
          stacked: true,
        }),
      });
    },
  },

  'count-stat': {
    label: 'Single number (matching rulings)',
    wide: false,
    defaults: {},
    title:    () => 'Total rulings (filtered)',
    render:   async (panel, where) => {
      const r = (await conn.query(
        `SELECT COUNT(*) n FROM 'data.parquet' WHERE ${where}`)).toArray()[0];
      const wrap = $(panel.canvasId)?.parentElement;
      if (!wrap) return;
      destroyChart(panel.canvasId);
      wrap.innerHTML =
        `<div class="stat-display">` +
          `<div class="stat-value">${Number(r.n).toLocaleString()}</div>` +
          `<div class="stat-sub">rulings match the current filters</div>` +
        `</div>`;
    },
  },
};

const DEFAULT_PANELS = [
  { id: 'p1', preset: 'time-series',         cfg: {} },
  { id: 'p2', preset: 'top-motion-types',    cfg: { topN: 12 } },
  { id: 'p3', preset: 'top-judges',          cfg: { topN: 12 } },
  { id: 'p4', preset: 'motion-type-stack',   cfg: { topN: 6 } },
  { id: 'p5', preset: 'outcome-bar',         cfg: {} },
  { id: 'p6', preset: 'outcome-pct-by-type', cfg: { outcome: 'Granted / Sustained', topN: 12 } },
];

// Panel state. Loaded from localStorage on first refresh; reset button
// restores DEFAULT_PANELS.
const PANEL_STORAGE_KEY = 'sfsc-panels-v1';
let panels = loadPanels();
let panelIdSeq = 1;
function nextPanelId() { return 'p' + (++panelIdSeq); }

function loadPanels() {
  try {
    const raw = localStorage.getItem(PANEL_STORAGE_KEY);
    if (!raw) return structuredClone(DEFAULT_PANELS);
    const list = JSON.parse(raw);
    if (!Array.isArray(list) || !list.length) return structuredClone(DEFAULT_PANELS);
    return list.map(p => ({
      id: p.id || nextPanelId(),
      preset: PANEL_PRESETS[p.preset] ? p.preset : 'time-series',
      cfg: p.cfg || {},
    }));
  } catch { return structuredClone(DEFAULT_PANELS); }
}
function savePanels() {
  try { localStorage.setItem(PANEL_STORAGE_KEY, JSON.stringify(panels)); } catch {}
}

// Render the entire panel grid. Each panel becomes a chart-card with a
// header (title + edit/delete buttons) and a canvas. We re-render the cards
// only on layout changes; data refresh just re-runs the preset render fns.
function renderPanelGrid() {
  const grid = $('charts-grid');
  grid.innerHTML = '';
  for (const p of panels) {
    const preset = PANEL_PRESETS[p.preset];
    if (!preset) continue;
    p.canvasId = 'canvas-' + p.id;
    const card = document.createElement('div');
    card.className = 'chart-card' + (preset.wide ? ' wide' : '');
    card.innerHTML =
      `<div class="chart-header">` +
        `<h3 id="title-${p.id}"></h3>` +
        `<button class="panel-btn edit" title="Edit panel">⚙</button>` +
        `<button class="panel-btn del"  title="Remove panel">×</button>` +
      `</div>` +
      `<div class="panel-config" id="config-${p.id}"></div>` +
      `<div class="chart-wrap"><canvas id="${p.canvasId}"></canvas></div>`;
    grid.appendChild(card);
    card.querySelector('.edit').addEventListener('click', () => togglePanelConfig(p));
    card.querySelector('.del').addEventListener('click', () => removePanel(p.id));
    renderPanelConfig(p);
  }
}

function renderPanelConfig(p) {
  const wrap = $('config-' + p.id);
  if (!wrap) return;
  const presetKeys = Object.keys(PANEL_PRESETS);
  let html = `<div class="panel-config-row">` +
    `<label>Preset</label>` +
    `<select class="preset-pick">` +
    presetKeys.map(k => `<option value="${k}"${k === p.preset ? ' selected' : ''}>${esc(PANEL_PRESETS[k].label)}</option>`).join('') +
    `</select></div>`;
  const fields = PANEL_PRESETS[p.preset].configFields || [];
  for (const [key, label, kind] of fields) {
    if (kind === 'number') {
      html += `<div class="panel-config-row"><label>${esc(label)}</label>` +
        `<input type="number" min="1" data-cfg="${key}" value="${esc(p.cfg[key] ?? PANEL_PRESETS[p.preset].defaults[key] ?? 12)}"></div>`;
    } else if (kind === 'outcome') {
      const opts = ['Granted / Sustained', 'Denied', 'Continued', 'Off calendar',
                    'Withdrawn', 'Moot', 'Transferred', 'Under submission', 'Other'];
      html += `<div class="panel-config-row"><label>${esc(label)}</label>` +
        `<select data-cfg="${key}">` +
        opts.map(o => `<option value="${esc(o)}"${o === p.cfg[key] ? ' selected' : ''}>${esc(o)}</option>`).join('') +
        `</select></div>`;
    }
  }
  wrap.innerHTML = html;
  wrap.querySelector('.preset-pick').addEventListener('change', e => {
    p.preset = e.target.value;
    p.cfg = { ...(PANEL_PRESETS[p.preset].defaults || {}) };
    savePanels(); renderPanelGrid(); refreshAllPanels();
  });
  for (const inp of wrap.querySelectorAll('[data-cfg]')) {
    inp.addEventListener('change', () => {
      const key = inp.dataset.cfg;
      p.cfg[key] = inp.type === 'number' ? +inp.value : inp.value;
      savePanels(); refreshPanel(p);
    });
  }
}

function togglePanelConfig(p) {
  const wrap = $('config-' + p.id);
  wrap.classList.toggle('open');
}

function removePanel(id) {
  panels = panels.filter(p => p.id !== id);
  savePanels(); renderPanelGrid(); refreshAllPanels();
}

function addPanel() {
  panels.push({ id: nextPanelId(), preset: 'time-series', cfg: {} });
  savePanels(); renderPanelGrid(); refreshAllPanels();
}

function resetPanels() {
  panels = structuredClone(DEFAULT_PANELS);
  savePanels(); renderPanelGrid(); refreshAllPanels();
}

function granularityChoice() {
  return $('chart-granularity')?.value || 'auto';
}

async function refreshPanel(p) {
  const where = buildWhere();
  const g = pickGranularity(granularityChoice(), dateFrom.value, dateTo.value);
  const preset = PANEL_PRESETS[p.preset];
  const titleEl = $('title-' + p.id);
  if (titleEl) titleEl.textContent = preset.title(p.cfg, g);
  try {
    await preset.render(p, where, g);
  } catch (err) {
    console.error('Panel render failed:', p, err);
  }
}

async function refreshAllPanels() {
  const g = pickGranularity(granularityChoice(), dateFrom.value, dateTo.value);
  const eff = $('chart-granularity-effective');
  if (eff) {
    eff.textContent = granularityChoice() === 'auto'
      ? `(auto → ${granularityLabel(g)})` : '';
  }
  await Promise.all(panels.map(refreshPanel));
}

// Backwards-compat shim — runQuery still calls refreshCharts(where).
async function refreshCharts(_where) { await refreshAllPanels(); }

// ─── Charts toggle ───────────────────────────────────────────────────────────
$('charts-btn').addEventListener('click', () => {
  const panel = $('charts-panel');
  const open = panel.classList.toggle('open');
  $('charts-btn').classList.toggle('active', open);
  if (open) {
    // First open: build the panel grid from the saved layout, then refresh.
    if (!$('charts-grid').children.length) renderPanelGrid();
    refreshAllPanels();
  }
});

$('chart-granularity').addEventListener('change', () => {
  if ($('charts-panel').classList.contains('open')) refreshAllPanels();
});
$('add-panel-btn').addEventListener('click', addPanel);
$('reset-panels-btn').addEventListener('click', () => {
  if (confirm('Reset all panels to the default layout?')) resetPanels();
});

// ─── CSV export ──────────────────────────────────────────────────────────────
$('export-btn').addEventListener('click', async () => {
  if (!conn) return;
  const orig = $('export-btn').textContent;
  $('export-btn').disabled = true; $('export-btn').textContent = '…';
  const all = (await conn.query(`
    SELECT department, case_number, case_title, court_date, hearing_time,
           calendar_matter, judge, ruling
    FROM 'data.parquet' WHERE ${buildWhere()}
    ORDER BY ${sortCol} ${sortDir}, case_number
  `)).toArray();
  const cols = ['department','case_number','case_title','court_date','hearing_time',
                'calendar_matter','motion_type','motion_subtype','outcome','outcome_subtype',
                'judge','ruling','admin_notes','courtcall'];
  const lines = [cols.join(',')];
  for (const r of all) {
    if (!outcomeFilterMatches(r)) continue;
    const m = lookupMotion(r.department, r.calendar_matter);
    const sp = splitRuling(r.ruling, r.department);
    const o  = lookupOutcome(sp.ruling);
    const rec = {
      department: r.department, case_number: r.case_number, case_title: r.case_title,
      court_date: r.court_date, hearing_time: r.hearing_time,
      calendar_matter: r.calendar_matter, motion_type: m.type, motion_subtype: m.subtype || '',
      outcome: o.outcome, outcome_subtype: o.subtype || '',
      judge: r.judge, ruling: sp.ruling, admin_notes: sp.admin, courtcall: sp.courtcall,
    };
    lines.push(cols.map(c => csvCell(rec[c])).join(','));
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lines.join('\n')], { type: 'text/csv' }));
  a.download = `sfsc-rulings-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  $('export-btn').disabled = false; $('export-btn').textContent = orig;
});

// Outcome filters live outside SQL because the classifier reads ruling text.
// Apply them in JS to whatever rows the SQL pass returns.
function outcomeFilters() {
  return customFilters.filter(f =>
    (f.col === 'outcome' || f.col === 'outcome_subtype') && (f.value ?? '').trim()
  );
}
function outcomeFilterMatches(row) {
  const filters = outcomeFilters();
  if (!filters.length) return true;
  const sp = splitRuling(row.ruling, row.department);
  const o  = lookupOutcome(sp.ruling);
  for (const f of filters) {
    const v = (f.value || '').trim();
    const actual = f.col === 'outcome' ? (o.outcome || '') : (o.subtype || '');
    if (f.op === 'is'           && actual !== v) return false;
    if (f.op === 'is not'       && actual === v) return false;
    if (f.op === 'contains'     && !actual.toLowerCase().includes(v.toLowerCase())) return false;
  }
  return true;
}

// ─── Clear ───────────────────────────────────────────────────────────────────
$('clear-btn').addEventListener('click', async () => {
  searchEl.value = '';
  deptEl.value = '';
  judgeEl.value = '';
  mtypeEl.value = '';
  msubEl.value = '';
  msubChip.style.display = 'none';
  customFilters = [];
  renderFilterRows();
  if (conn) {
    const s = (await conn.query(
      `SELECT MIN(court_date) lo, MAX(court_date) hi FROM 'data.parquet'`
    )).toArray()[0];
    dateFrom.value = s.lo; dateTo.value = s.hi;
  }
  runQuery(0);
});

// ─── Motion-type → subtype dropdown chaining ─────────────────────────────────
function refreshSubtypeOptions() {
  const t = mtypeEl.value;
  const subs = new Set();
  if (t) {
    for (const inner of MTYPE_CACHE.values()) {
      for (const cls of inner.values()) {
        if (cls.type === t && cls.subtype) subs.add(cls.subtype);
      }
    }
  }
  msubEl.innerHTML = '<option value="">All</option>';
  if (subs.size) {
    for (const s of [...subs].sort()) msubEl.appendChild(new Option(s, s));
    msubChip.style.display = '';
  } else {
    msubChip.style.display = 'none';
    msubEl.value = '';
  }
}
mtypeEl.addEventListener('change', () => { refreshSubtypeOptions(); runQuery(0); });
msubEl.addEventListener('change', () => runQuery(0));

// ─── "+ Add filter" builder ─────────────────────────────────────────────────
$('advanced-btn').addEventListener('click', () => {
  const fb = $('filter-builder');
  const open = fb.classList.toggle('open');
  $('advanced-btn').classList.toggle('active', open);
  if (open && customFilters.length === 0) addCustomFilter();
});

$('add-filter-btn').addEventListener('click', () => addCustomFilter());

function addCustomFilter() {
  customFilters.push({ id: nextFilterId++, col: 'ruling', op: 'contains', value: '' });
  renderFilterRows();
}

function renderFilterRows() {
  const wrap = $('filter-rows');
  wrap.innerHTML = '';
  for (const f of customFilters) {
    const row = document.createElement('div');
    row.className = 'filter-row';
    const colSel = document.createElement('select');
    for (const [c, label] of FILTER_COLS) colSel.appendChild(new Option(label, c));
    colSel.value = f.col;
    const opSel = document.createElement('select');
    const valIn = document.createElement('input');
    valIn.placeholder = 'value';
    valIn.value = f.value || '';
    function refreshOps() {
      const colDef = FILTER_COLS.find(c => c[0] === colSel.value);
      const ops = colDef ? colDef[2] : ['contains'];
      opSel.innerHTML = '';
      for (const op of ops) opSel.appendChild(new Option(op, op));
      if (!ops.includes(f.op)) f.op = ops[0];
      opSel.value = f.op;
      // Date column gets a date input
      if (colSel.value === 'court_date') {
        valIn.type = f.op === 'between' ? 'text' : 'date';
        valIn.placeholder = f.op === 'between' ? 'YYYY-MM-DD..YYYY-MM-DD' : '';
      } else {
        valIn.type = 'text';
        valIn.placeholder = 'value';
      }
    }
    refreshOps();
    colSel.addEventListener('change', () => { f.col = colSel.value; refreshOps(); runQuery(0); });
    opSel.addEventListener('change',  () => { f.op  = opSel.value;  refreshOps(); runQuery(0); });
    valIn.addEventListener('input',   () => { f.value = valIn.value; debounceQuery(); });
    valIn.addEventListener('change',  () => { f.value = valIn.value; runQuery(0); });
    const x = document.createElement('button');
    x.className = 'x'; x.textContent = '×'; x.title = 'Remove filter';
    x.addEventListener('click', () => {
      customFilters = customFilters.filter(g => g.id !== f.id);
      renderFilterRows();
      runQuery(0);
    });
    row.append(colSel, opSel, valIn, x);
    wrap.appendChild(row);
  }
}

// ─── Modal ───────────────────────────────────────────────────────────────────
function openModal(r) {
  $('modal-title').textContent = r.case_title ?? '';
  const m = lookupMotion(r.department, r.calendar_matter);
  const sp = splitRuling(r.ruling, r.department);
  const o = lookupOutcome(sp.ruling);
  const meta = $('modal-meta');
  meta.innerHTML = '';
  const pills = [
    r.department ? `Dept ${r.department}` : null,
    r.case_number, r.court_date, r.hearing_time, r.judge,
    m.type, m.subtype && `· ${m.subtype}`,
    o.outcome && o.outcome !== 'Other' && o.outcome !== 'Unknown' ? `→ ${o.outcome}` : null,
    o.subtype ? `· ${o.subtype}` : null,
  ].filter(Boolean);
  for (const p of pills) {
    const span = document.createElement('span');
    span.className = 'pill'; span.textContent = p;
    meta.appendChild(span);
  }
  $('modal-motion').textContent = r.calendar_matter ?? '';
  $('modal-ruling').textContent = sp.ruling;
  $('modal-admin').textContent  = sp.admin;
  $('modal-cc').textContent     = sp.courtcall;
  $('modal-admin-label').style.display = sp.admin ? '' : 'none';
  $('modal-admin').style.display       = sp.admin ? '' : 'none';
  $('modal-cc-label').style.display    = sp.courtcall ? '' : 'none';
  $('modal-cc').style.display          = sp.courtcall ? '' : 'none';
  $('overlay').classList.add('open');
}
function closeModal() { $('overlay').classList.remove('open'); }
$('modal-close').addEventListener('click', closeModal);
$('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─── URL state ───────────────────────────────────────────────────────────────
function saveState() {
  const p = new URLSearchParams();
  if (searchEl.value) p.set('q', searchEl.value);
  if (dateFrom.value) p.set('from', dateFrom.value);
  if (dateTo.value)   p.set('to', dateTo.value);
  if (deptEl.value)   p.set('dept', deptEl.value);
  if (judgeEl.value)  p.set('judge', judgeEl.value);
  if (mtypeEl.value)  p.set('mtype', mtypeEl.value);
  if (msubEl.value)   p.set('msub', msubEl.value);
  if (sortCol !== 'court_date') p.set('sort', sortCol);
  if (sortDir !== 'DESC')       p.set('dir', sortDir);
  if (currentPage)    p.set('page', currentPage);
  if (customFilters.length) {
    p.set('f', JSON.stringify(customFilters.map(f => ({ c: f.col, o: f.op, v: f.value }))));
  }
  history.replaceState(null, '', '#' + p.toString());
}
function restoreState() {
  if (!location.hash) return;
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.get('q'))     searchEl.value = p.get('q');
  if (p.get('from'))  dateFrom.value = p.get('from');
  if (p.get('to'))    dateTo.value   = p.get('to');
  if (p.get('dept'))  deptEl.value   = p.get('dept');
  if (p.get('judge')) judgeEl.value  = p.get('judge');
  if (p.get('sort'))  sortCol = p.get('sort');
  if (p.get('dir'))   sortDir = p.get('dir');
  if (p.get('page'))  currentPage    = +p.get('page');
  if (p.get('f')) {
    try {
      customFilters = JSON.parse(p.get('f')).map(f => ({
        id: nextFilterId++, col: f.c, op: f.o, value: f.v,
      }));
      renderFilterRows();
      $('filter-builder').classList.add('open');
      $('advanced-btn').classList.add('active');
    } catch { /* ignore corrupted state */ }
  }
  // Mtype/msub need careful ordering: setting mtypeEl and dispatching change
  // rebuilds the msub <option>s, which would wipe a value set beforehand. So
  // refresh the subtype dropdown first, then restore msub.
  if (p.get('mtype')) {
    mtypeEl.value = p.get('mtype');
    refreshSubtypeOptions();
  }
  if (p.get('msub')) msubEl.value = p.get('msub');
  // Sync the sortable header arrow with the restored sortCol/sortDir.
  document.querySelectorAll('th.sortable').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === sortCol) {
      th.classList.add(sortDir === 'ASC' ? 'sort-asc' : 'sort-desc');
    }
  });
}

// ─── Events ──────────────────────────────────────────────────────────────────
let timer;
function debounceQuery() { clearTimeout(timer); timer = setTimeout(() => runQuery(0), 350); }
searchEl.addEventListener('input',  () => debounceQuery());
dateFrom.addEventListener('change', () => runQuery(0));
dateTo.addEventListener('change',   () => runQuery(0));
deptEl.addEventListener('change',   () => runQuery(0));
judgeEl.addEventListener('change',  () => runQuery(0));

function esc(s) {
  return (s ?? '').toString()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function csvCell(v) {
  const s = (v ?? '').toString().replace(/"/g, '""');
  return /[",\n]/.test(s) ? `"${s}"` : s;
}
