<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      margin: 0;
      color: #222;
      font-size: 13px;
    }

    header {
      background: #1a3a5c;
      color: white;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .header-text { flex: 1; min-width: 0; }
    header h1 { font-size: 0.95rem; font-weight: 600; margin: 0; }
    header p  { font-size: 0.75rem; opacity: 0.7; margin: 0.15rem 0 0; }
    #detach-btn {
      width: auto;
      flex-shrink: 0;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.18rem 0.5rem;
      border-radius: 4px;
      margin: 0;
      cursor: pointer;
      line-height: 1.1;
    }
    #detach-btn:hover { background: rgba(255,255,255,0.22); }

    /* ── Custom calendar popup (replaces the native <input type="date">
       picker — that one is unreliable inside MV3 popups in Firefox and
       can't decorate days with scan status). Renders below the cal-btn,
       month-view grid, prev/next nav, day cells colored by:
         covered  — green  (already in archive)
         inflight — orange (being scanned by another tab right now)
         holiday  — grey   (court holiday, struck through)
         weekend  — grey   (Sat/Sun, no scrape needed)
         today    — blue outline
       Click a day → set the bound text input + close. */
    .cal-pop {
      display: none; position: absolute; z-index: 1000;
      background: white; border: 1px solid #ccc; border-radius: 5px;
      padding: 0.45rem; box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      width: 232px; font-size: 0.76rem;
    }
    .cal-pop.open { display: block; }
    .cal-header {
      display: flex; align-items: center; gap: 0.3rem; margin-bottom: 0.35rem;
    }
    .cal-title {
      flex: 1; text-align: center; font-weight: 600; color: #1a3a5c;
    }
    .cal-nav {
      width: auto; margin: 0; padding: 0.05rem 0.45rem;
      background: #eef3fb; color: #1a3a5c; border: 1px solid #c8d8f0;
      border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 0.85rem;
    }
    .cal-nav:hover { background: #d8e8f8; }
    .cal-dow {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
      font-size: 0.62rem; color: #888; text-transform: uppercase;
      margin-bottom: 0.18rem;
    }
    .cal-dow > div { text-align: center; padding: 0.1rem 0; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
    }
    .cal-grid > .cal-empty { background: transparent; }
    .cal-day {
      width: auto; margin: 0; padding: 0.22rem 0;
      background: white; border: 1px solid transparent;
      border-radius: 3px; cursor: pointer; text-align: center;
      font-size: 0.72rem; font-weight: 400; color: #333;
    }
    .cal-day:hover {
      background: #eef3fb; border-color: #5a8fc8;
    }
    .cal-day.cal-today {
      font-weight: 700; border-color: #1a3a5c;
    }
    .cal-day.cal-weekend {
      color: #b0b0b0; background: #fafafa;
    }
    .cal-day.cal-holiday {
      color: #b0b0b0; background: #f0f0f0; text-decoration: line-through;
    }
    .cal-day.cal-covered {
      background: #e3f3e3; color: #1a5c2a;
    }
    .cal-day.cal-covered:hover { background: #c8e8c8; }
    .cal-day.cal-inflight {
      background: #fff3cd; color: #7a5c00;
      border-color: #e8c060; font-weight: 600;
      box-shadow: inset 0 0 0 1px #e8c060;
    }
    .cal-day.cal-inflight:hover { background: #ffe699; }
    .cal-legend {
      margin-top: 0.4rem; font-size: 0.62rem; color: #666;
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.15rem 0.3rem;
    }
    .cal-legend > span {
      display: flex; align-items: center; gap: 0.25rem;
      white-space: nowrap;
    }
    .cal-legend .cal-swatch {
      display: inline-block; width: 9px; height: 9px;
      border-radius: 2px; flex-shrink: 0;
    }
    .cal-status-line {
      margin-top: 0.3rem; padding-top: 0.3rem;
      border-top: 1px solid #eee; font-size: 0.66rem;
      color: #888; line-height: 1.3;
    }
    .cal-status-line.cal-status-loading { color: #5a8fc8; }
    .cal-status-line.cal-status-error   { color: #a02020; }

    main { padding: 0.85rem 1rem; }

    #update-banner {
      display: none;
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 5px;
      padding: 0.45rem 0.75rem;
      margin-bottom: 0.6rem;
      font-size: 0.78rem;
      color: #5d4200;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    #update-banner span { flex: 1; }
    #update-banner button {
      width: auto;
      padding: 0.2rem 0.5rem;
      font-size: 0.72rem;
      background: #ffa000;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      margin: 0;
      font-weight: 600;
    }

    .status {
      background: #f0f5ff;
      border: 1px solid #c8d8f0;
      border-radius: 5px;
      padding: 0.6rem 0.75rem;
      margin-bottom: 0.75rem;
      font-size: 0.8rem;
      color: #1a3a5c;
      min-height: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .status.error   { background: #fff0f0; border-color: #f5c6c6; color: #7a2020; }
    .status.success { background: #f0fff4; border-color: #b2dfca; color: #1a5c2a; }
    .status.warn    { background: #fffbea; border-color: #f5e0a0; color: #7a5c00; }
    .spinner {
      width: 14px; height: 14px; flex-shrink: 0;
      border: 2px solid #c8d8f0; border-top-color: #1a3a5c;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    button {
      width: 100%;
      padding: 0.5rem;
      border: none;
      border-radius: 5px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 0.5rem;
    }
    #send-btn { background: #1a3a5c; color: white; }
    #send-btn:hover:not(:disabled) { background: #214d78; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    /* Bulk scrape section */
    #bulk-section {
      border-top: 1px solid #e8eef8;
      margin-top: 0.25rem;
      padding-top: 0.6rem;
    }
    .bulk-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .bulk-row > div { flex: 1; }
    .bulk-row label { display: block; font-size: 0.72rem; color: #555; margin-bottom: 0.15rem; }

    /* Date text + calendar button */
    .date-wrap {
      display: flex;
      position: relative;
    }
    .date-wrap input[type="text"] {
      flex: 1;
      padding: 0.3rem 0.4rem;
      border: 1px solid #ccc;
      border-right: none;
      border-radius: 4px 0 0 4px;
      font-size: 0.78rem;
      font-family: monospace;
      box-sizing: border-box;
      width: 100%;
    }
    .date-wrap input[type="text"]:focus { outline: none; border-color: #5a8fc8; box-shadow: 0 0 0 1px #5a8fc8; }
    .date-wrap input[type="text"].invalid { border-color: #e55; }
    .cal-btn {
      width: auto;
      padding: 0 0.45rem;
      background: #eef3fb;
      border: 1px solid #ccc;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
      font-size: 0.8rem;
      margin: 0;
      color: #1a3a5c;
      line-height: 1;
    }
    .cal-btn:hover { background: #d8e8f8; }
    /* Hidden native date picker — positioned over calendar button so browser picker appears there */
    .hidden-picker {
      position: absolute;
      right: 0;
      top: 0;
      width: 28px;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      font-size: 1px;
    }

    .bulk-row input[type="number"] {
      width: 100%;
      padding: 0.3rem 0.4rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.78rem;
      box-sizing: border-box;
    }
    #auto-scan-btn {
      background: #2a7a4a;
      color: white;
      font-size: 0.875rem;
      margin-bottom: 0.6rem;
    }
    #auto-scan-btn:hover:not(:disabled) { background: #338a58; }
    #auto-scan-btn:disabled { opacity: 0.4; cursor: default; }

    #catchup-all-btn {
      background: #1a6c5a;
      color: white;
      font-size: 0.82rem;
      margin-bottom: 0.6rem;
    }
    #catchup-all-btn:hover:not(:disabled) { background: #228470; }
    #catchup-all-btn:disabled { opacity: 0.4; cursor: default; }

    #bulk-btn {
      background: #2e6da4;
      color: white;
      font-size: 0.82rem;
    }
    #bulk-btn:hover:not(:disabled) { background: #3880bc; }
    #bulk-btn:disabled { opacity: 0.4; cursor: default; }
    #bulk-stop {
      display: none;
      background: #c0392b;
      color: white;
      font-size: 0.78rem;
      padding: 0.3rem;
      margin-top: -0.3rem;
    }
    #bulk-stop:hover { background: #e74c3c; }

    #settings-btn {
      background: none;
      color: #888;
      font-size: 0.78rem;
      font-weight: 400;
      padding: 0.2rem;
      text-decoration: underline;
    }
    #settings-btn:hover { color: #444; }

    /* Settings panel */
    #settings {
      display: none;
      border-top: 1px solid #eee;
      padding-top: 0.75rem;
      margin-top: 0.25rem;
    }
    label { display: block; font-size: 0.78rem; color: #555; margin-bottom: 0.1rem; }
    input[type=text].setting-field, input[type=password] {
      width: 100%;
      padding: 0.35rem 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.8rem;
      margin-bottom: 0.1rem;
      box-sizing: border-box;
    }
    input[type=text].setting-field:focus, input[type=password]:focus {
      outline: none; border-color: #5a8fc8;
    }
    .field-saved {
      font-size: 0.68rem;
      color: #2a8a4a;
      height: 0.9rem;
      margin-bottom: 0.4rem;
      transition: opacity 0.3s;
    }
    .hint { font-size: 0.72rem; color: #aaa; margin: 0 0 0.5rem; }
  </style>
</head>
<body>
  <header>
    <div class="header-text">
      <h1>SFSC Tentative Rulings</h1>
      <p>SF Superior Court scraper</p>
    </div>
    <button id="detach-btn">⧉ Detach</button>
  </header>

  <main>
    <div id="update-banner">
      <span>Update available</span>
      <button id="update-download">Download</button>
      <button id="update-dismiss" >✕</button>
    </div>

    <div class="status" id="status">
      <span>Checking page…</span>
    </div>

    <button id="send-btn" disabled>Send to GitHub</button>
    <div id="hotkey-hint" style="font-size:0.72rem;color:#666;margin:-0.25rem 0 0.5rem;padding:0 0.1rem">
      <span id="hotkey-text">⚡ <kbd id="hotkey-key" style="background:#eef3fb;border:1px solid #ccd6e6;border-radius:3px;padding:0 4px;font-family:inherit;font-size:0.7rem">Alt+Shift+S</kbd> commit &amp; load next day</span>
      &nbsp;·&nbsp;
      <a href="#" id="hotkey-config" style="color:#5a8fc8;text-decoration:none">change</a>
    </div>
    <button id="diag-btn" style="background:#f5f5f5;color:#444;font-size:0.75rem;font-weight:400;padding:0.25rem">Diagnose page</button>

    <div id="bulk-section">
      <div id="scan-direction-card" style="background:#fff8e1;border:1px solid #ffd97a;border-radius:5px;padding:0.45rem 0.6rem;margin-bottom:0.6rem;font-size:0.78rem;color:#5b4400">
        <div style="font-weight:700;margin-bottom:0.3rem;display:flex;align-items:center;gap:0.3rem">
          <span style="font-size:0.85rem">📅</span>
          <span>Scan order</span>
        </div>
        <label style="display:flex;align-items:center;gap:0.4rem;padding:0.15rem 0;cursor:pointer">
          <input type="radio" name="scan-direction" value="forward" checked style="margin:0">
          <span>⏭ Forward — oldest unscanned first</span>
        </label>
        <label style="display:flex;align-items:center;gap:0.4rem;padding:0.15rem 0;cursor:pointer">
          <input type="radio" name="scan-direction" value="backward" style="margin:0">
          <span>⏮ Backward — newest unscanned first</span>
        </label>
      </div>
      <button id="auto-scan-btn" disabled>Scan Unscanned Pages</button>
      <button id="catchup-all-btn" title="Open one tab per department in the manifest and scan every unscanned weekday up through the next business day after today. Doesn't require an open SFTC tab.">Catch up all depts (through tomorrow)</button>
      <div class="bulk-row">
        <div>
          <label>From</label>
          <div class="date-wrap">
            <input type="text" id="bulk-from" placeholder="YYYY-MM-DD" maxlength="10">
            <button class="cal-btn" id="cal-from" title="Open calendar">📅</button>
            <input type="date" id="bulk-from-picker" class="hidden-picker" tabindex="-1">
          </div>
        </div>
        <div>
          <label>To <span style="font-weight:400;color:#aaa">(blank = today)</span></label>
          <div class="date-wrap">
            <input type="text" id="bulk-to" placeholder="YYYY-MM-DD or blank">
            <button class="cal-btn" id="cal-to" title="Open calendar">📅</button>
            <input type="date" id="bulk-to-picker" class="hidden-picker" tabindex="-1">
          </div>
        </div>
      </div>
      <div style="display:flex;gap:0.4rem;margin-bottom:0.5rem">
        <button id="jump-first" style="flex:1;background:#f0f5ff;color:#1a3a5c;font-size:0.72rem;font-weight:500;padding:0.25rem;margin:0" title="Jump to earliest unscanned weekday">⏮ First gap</button>
        <button id="jump-last"  style="flex:1;background:#f0f5ff;color:#1a3a5c;font-size:0.72rem;font-weight:500;padding:0.25rem;margin:0" title="Resume from day after last commit">⏭ Resume</button>
      </div>
      <div class="bulk-row" style="margin-bottom:0.4rem">
        <div style="flex:1">
          <label>Search timeout (ms)</label>
          <input type="number" id="bulk-wait" value="5000" min="100" step="100" placeholder="ms">
        </div>
      </div>
      <label id="skip-scanned-row" style="display:flex;align-items:center;gap:0.35rem;margin-bottom:0.5rem;font-size:0.74rem;color:#1a3a5c;cursor:pointer">
        <input type="checkbox" id="skip-scanned" style="margin:0">
        Skip dates already scanned in this range
      </label>
      <button id="bulk-btn" disabled>Bulk Scrape Range</button>
      <button id="bulk-stop">Stop</button>
      <button id="bulk-resume" style="display:none;background:#2a7a4a;color:white;font-size:0.82rem">Resume after CAPTCHA</button>
    </div>

    <div id="all-scans" style="display:none;border-top:1px solid #e8eef8;margin-top:0.4rem;padding-top:0.5rem;font-size:0.74rem;color:#1a3a5c">
      <div style="font-weight:600;margin-bottom:0.3rem">All running scans</div>
      <div id="all-scans-list"></div>
    </div>

    <button id="settings-btn">⚙ Settings</button>

    <div id="settings">
      <label>GitHub Token (PAT with Contents: write)</label>
      <input type="password" id="token" placeholder="github_pat_…">
      <p class="hint">github.com → Settings → Developer settings → Personal access tokens</p>

      <label>Repository (owner/repo)</label>
      <input type="text" class="setting-field" id="repo" placeholder="aimesy/sfsc-tentatives">
      <div class="field-saved" id="repo-saved"></div>

      <label>Branch</label>
      <input type="text" class="setting-field" id="branch" placeholder="master">
      <div class="field-saved" id="branch-saved"></div>
    </div>
  </main>

  <!-- Custom calendar popup: shared between bulk-from / bulk-to. Rendered
       on demand by openCustomCalendar() in popup.js; positioned absolutely
       under the calendar button that triggered it. -->
  <div id="cal-pop" class="cal-pop"></div>

  <script src="holidays.js"></script>
  <script src="popup.js"></script>
</body>
</html>
